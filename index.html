<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专插本英语 · 3000词刷题</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0f172a; color: #e2e8f0; min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start; padding: 16px;
}
.app { width: 100%; max-width: 600px; }
h1 { text-align: center; font-size: 20px; margin: 12px 0 16px; color: #f1f5f9; letter-spacing: 1px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #1e293b; border-radius: 12px; padding: 4px; }
.tab {
  flex: 1; text-align: center; padding: 10px 6px; border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all .2s; color: #94a3b8; border: none; background: transparent;
}
.tab.active { background: #3b82f6; color: #fff; }
.tab:hover:not(.active) { color: #e2e8f0; }

/* Stats */
.stats { display: flex; justify-content: space-around; margin-bottom: 16px; gap: 8px; }
.stat { background: #1e293b; border-radius: 12px; padding: 12px 16px; text-align: center; flex: 1; }
.stat-val { font-size: 24px; font-weight: 700; color: #38bdf8; }
.stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }

/* Card */
.card { background: #1e293b; border-radius: 16px; padding: 24px; margin-bottom: 12px; }
.question { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 20px; line-height: 1.5; color: #f1f5f9; }
.question .en { color: #facc15; }
.question .zh { color: #38bdf8; }
.question small { font-size: 14px; color: #94a3b8; display: block; margin-top: 4px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 14px 18px;
  cursor: pointer; font-size: 16px; transition: all .15s; text-align: left; width: 100%; color: #e2e8f0;
}
.opt:hover { border-color: #3b82f6; background: #1e293b; }
.opt.correct { border-color: #22c55e; background: #052e16; color: #22c55e; }
.opt.wrong { border-color: #ef4444; background: #450a0a; color: #ef4444; }
.opt:disabled { pointer-events: none; opacity: .7; }
.opt:disabled.correct { opacity: 1; }

/* Feedback */
.feedback { text-align: center; margin-top: 16px; font-size: 15px; min-height: 24px; }
.feedback .right { color: #22c55e; font-weight: 600; }
.feedback .wrong { color: #ef4444; }

/* Next button */
.next-btn {
  display: block; margin: 16px auto 0; padding: 12px 40px; border-radius: 10px;
  border: none; background: #3b82f6; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.next-btn:hover { background: #2563eb; }
.next-btn:disabled { opacity: .3; cursor: not-allowed; }

/* Progress */
.progress { margin-top: 16px; background: #1e293b; border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: #3b82f6; transition: width .3s; border-radius: 8px; }

/* Filter row */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid #475569; background: transparent;
  color: #94a3b8; cursor: pointer; font-size: 13px; transition: all .15s;
}
.filter-btn.active { background: #334155; border-color: #3b82f6; color: #e2e8f0; }
.filter-btn.expanded { background: #1e3a5f; border-color: #60a5fa; color: #60a5fa; }
.sub-row { display: none; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; padding: 4px 0 4px 8px; border-left: 2px solid #3b82f6; }
.sub-btn {
  padding: 4px 10px; border-radius: 16px; border: 1px solid #475569; background: transparent;
  color: #94a3b8; cursor: pointer; font-size: 12px; transition: all .15s;
}
.sub-btn:hover { border-color: #3b82f6; color: #e2e8f0; }
.sub-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
.reset-btn {
  display: block; margin: 8px auto 0; background: transparent; border: 1px solid #ef4444;
  color: #ef4444; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
  transition: all .15s;
}
.reset-btn:hover { background: #ef4444; color: #fff; }

.blank-input {
  background: #0f172a; border: 2px solid #334155; border-radius: 10px; padding: 12px;
  font-size: 18px; color: #facc15; text-align: center; width: 200px; outline: none;
}
.blank-input:focus { border-color: #3b82f6; }

.essay-context { font-size: 15px; line-height: 1.7; color: #cbd5e1; text-align: left; }
.essay-context .blank { color: #facc15; font-weight: 600; border-bottom: 2px dashed #facc15; }
</style>
</head>
<body>
<div class="app">
  <h1>📚 专插本英语 · 3000词刷题</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchMode('ec')">🇬🇧→🇨🇳 英译中</button>
    <button class="tab" onclick="switchMode('ce')">🇨🇳→🇬🇧 中译英</button>
    <button class="tab" onclick="switchMode('cloze')">📝 短文填空</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="correct">0</div><div class="stat-label">✅ 正确</div></div>
    <div class="stat"><div class="stat-val" id="total">0</div><div class="stat-label">📊 总题数</div></div>
    <div class="stat"><div class="stat-val" id="streak">0</div><div class="stat-label">🔥 连对</div></div>
    <div class="stat"><div class="stat-val" id="accuracy">-</div><div class="stat-label">📈 正确率</div></div>
  </div>
  <button class="reset-btn" onclick="resetStats()">🔄 重置战绩</button>

  <div id="filterRow" class="filter-row"></div>
  <div id="subRow" class="sub-row"></div>

  <div class="card">
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div style="text-align:center; margin-top:16px;">
    <a href="YF.html" style="color:#60a5fa; text-decoration:none; font-size:14px; border:1px solid #3b82f6; padding:8px 20px; border-radius:8px; display:inline-block; transition:all .15s;" onmouseover="this.style.background='#1e3a5f'" onmouseout="this.style.background='transparent'">📝 语法刷题 →</a>
  </div>
</div>

<script src="words.js"></script>
<script src="essays.js"></script>

<script>
let mode = 'ec';
let currentQuestion = null;
let answered = false;
let stats = JSON.parse(localStorage.getItem('quiz_stats') || '{"correct":0,"total":0,"streak":0,"bestStreak":0}');
let sessionStreak = 0;
let expandedLetter = null;
const HEAVY_THRESHOLD = 150;

function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

function getSubRanges(letter) {
  const l = letter.toUpperCase();
  const words = WORDS.filter(w => w.en[0].toUpperCase() === l);
  const groups = {};
  words.forEach(w => {
    const key = w.en.substring(0, 2).toUpperCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(w);
  });
  const keys = Object.keys(groups).sort();
  const ranges = [];
  let cur = { prefixes: [], count: 0, start: keys[0] };
  keys.forEach((key, i) => {
    if (cur.count > 0 && cur.count + groups[key].length > 60) {
      ranges.push({ label: cur.start + '-' + keys[i-1], prefixes: [...cur.prefixes], count: cur.count });
      cur = { prefixes: [], count: 0, start: key };
    }
    cur.prefixes.push(key);
    cur.count += groups[key].length;
  });
  if (cur.count > 0) {
    ranges.push({ label: cur.start + '-' + keys[keys.length-1], prefixes: [...cur.prefixes], count: cur.count });
  }
  // If only one range, no need for sub-ranges
  if (ranges.length <= 1) return null;
  return ranges;
}

function filterByPrefixes(pool, prefixes) {
  return pool.filter(w => prefixes.includes(w.en.substring(0, 2).toUpperCase()));
}

function resetStats() {
  if (confirm('确定要重置所有战绩数据吗？（正确数、总题数、连对记录将被清零）')) {
    stats = { correct: 0, total: 0, streak: 0, bestStreak: 0 };
    sessionStreak = 0;
    localStorage.removeItem('quiz_stats');
    updateStats();
  }
}

function randInt(n) { return Math.floor(Math.random()*n); }

function updateStats() {
  document.getElementById('correct').textContent = stats.correct;
  document.getElementById('total').textContent = stats.total;
  document.getElementById('streak').textContent = sessionStreak;
  const acc = stats.total > 0 ? Math.round(stats.correct/stats.total*100) + '%' : '-';
  document.getElementById('accuracy').textContent = acc;
  localStorage.setItem('quiz_stats', JSON.stringify(stats));
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&m==='ec')||(i===1&&m==='ce')||(i===2&&m==='cloze'));
  });
  renderFilter();
  nextQuestion();
}

function renderFilter() {
  const row = document.getElementById('filterRow');
  const subRow = document.getElementById('subRow');
  row.innerHTML = '';
  subRow.innerHTML = '';
  subRow.style.display = 'none';
  expandedLetter = null;

  if (mode === 'cloze') {
    ESSAYS.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = '#' + e.id;
      btn.title = e.title;
      btn.onclick = function() { document.querySelectorAll('#filterRow .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); nextQuestion(e.id); };
      row.appendChild(btn);
    });
  } else {
    const all = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    // Precompute counts
    const counts = {};
    all.forEach(l => { counts[l] = WORDS.filter(w => w.en[0].toUpperCase() === l).length; });

    // "全部" button
    const anyBtn = document.createElement('button');
    anyBtn.className = 'filter-btn active';
    anyBtn.textContent = '全部 (' + WORDS.length + ')';
    anyBtn.onclick = function() {
      document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('active'));
      anyBtn.classList.add('active');
      subRow.innerHTML = ''; subRow.style.display = 'none'; expandedLetter = null;
      nextQuestion();
    };
    row.appendChild(anyBtn);

    all.forEach(l => {
      const cnt = counts[l];
      if (cnt === 0) return;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = l + ' (' + cnt + ')';
      const isHeavy = cnt >= HEAVY_THRESHOLD;
      if (isHeavy) btn.textContent = l + ' (' + cnt + ') ▸';

      btn.onclick = function() {
        document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('active', 'expanded'));
        btn.classList.add('active');

        if (isHeavy) {
          // Toggle sub-row
          if (expandedLetter === l) {
            subRow.innerHTML = ''; subRow.style.display = 'none'; expandedLetter = null;
            nextQuestion(l); // fallback to full letter filter
            return;
          }
          expandedLetter = l;
          btn.classList.add('expanded');
          btn.textContent = l + ' (' + cnt + ') ▾';
          const ranges = getSubRanges(l);
          if (ranges) {
            subRow.innerHTML = '';
            ranges.forEach(r => {
              const sb = document.createElement('button');
              sb.className = 'sub-btn';
              sb.textContent = r.label + ' (' + r.count + ')';
              sb.setAttribute('data-filter', JSON.stringify(r.prefixes));
              sb.onclick = function(e) {
                e.stopPropagation();
                document.querySelectorAll('#subRow .sub-btn').forEach(b => b.classList.remove('active'));
                sb.classList.add('active');
                nextQuestion(JSON.parse(sb.getAttribute('data-filter')));
              };
              subRow.appendChild(sb);
            });
            subRow.style.display = 'flex';
          } else {
            // Only one sub-range, filter directly
            subRow.innerHTML = ''; subRow.style.display = 'none';
            nextQuestion(l);
          }
        } else {
          subRow.innerHTML = ''; subRow.style.display = 'none'; expandedLetter = null;
          nextQuestion(l);
        }
      };
      row.appendChild(btn);
    });
  }
}

function pickDistractors(correctWord, count, sameLetter) {
  let pool = WORDS.filter(w => w.en !== correctWord.en);
  if (sameLetter) {
    const letter = correctWord.en[0].toUpperCase();
    const same = pool.filter(w => w.en[0].toUpperCase() === letter);
    if (same.length >= count) pool = same;
  }
  return shuffle(pool).slice(0, count);
}

function applyFilter(pool, filter) {
  if (!filter) return pool;
  if (typeof filter === 'string' && filter.length === 1) return pool.filter(w => w.en[0].toUpperCase() === filter);
  if (Array.isArray(filter)) return filterByPrefixes(pool, filter);
  return pool;
}

function genECQuestion(filter) {
  let pool = applyFilter(WORDS, filter);
  const correct = pool[randInt(pool.length)];
  const distractors = pickDistractors(correct, 3, true);
  const options = shuffle([correct, ...distractors]);
  return {
    type: 'ec',
    prompt: '<span class="en">' + correct.en + '</span>',
    options: options.map(o => o.zh),
    correctIdx: options.findIndex(o => o.en === correct.en),
    answer: correct.zh,
    word: correct
  };
}

function genCEQuestion(filter) {
  let pool = applyFilter(WORDS, filter);
  const correct = pool[randInt(pool.length)];
  const distractors = pickDistractors(correct, 3, true);
  const options = shuffle([correct, ...distractors]);
  return {
    type: 'ce',
    prompt: '<span class="zh">' + correct.zh + '</span>',
    options: options.map(o => o.en),
    correctIdx: options.findIndex(o => o.en === correct.en),
    answer: correct.en,
    word: correct
  };
}

function genClozeQuestion(essayId) {
  let essay;
  if (essayId) essay = ESSAYS.find(e => e.id === essayId);
  if (!essay) essay = ESSAYS[randInt(ESSAYS.length)];

  // Find sentences that contain vocabulary words
  const sentences = essay.body.split(/(?<=[.!?])\s+/);
  const vocabLower = new Set(essay.vocabulary.map(v => v.toLowerCase()));

  // Pick a sentence that contains a vocab word
  let attempts = 0;
  while (attempts < 50) {
    const sentence = sentences[randInt(sentences.length)];
    if (!sentence || sentence.length < 20) { attempts++; continue; }
    const sentWords = sentence.match(/[a-zA-Z]+/g) || [];
    const candidates = sentWords.filter(w => vocabLower.has(w.toLowerCase()) && w.length >= 3);
    if (candidates.length === 0) { attempts++; continue; }
    const blankWord = candidates[randInt(candidates.length)];
    const wordData = WORDS.find(w => w.en.toLowerCase() === blankWord.toLowerCase());
    const blanked = sentence.replace(new RegExp('\\b' + blankWord + '\\b', 'i'), '<span class="blank">______</span>');

    // Generate distractors
    let distractors;
    if (wordData) {
      distractors = pickDistractors(wordData, 3, true).map(w => w.en);
    } else {
      distractors = shuffle(WORDS.filter(w => w.en.toLowerCase() !== blankWord.toLowerCase() && w.en.length >= 3)).slice(0, 3).map(w => w.en);
    }
    const options = shuffle([blankWord, ...distractors]);
    return {
      type: 'cloze',
      prompt: '<small>' + essay.title + ' (#' + essay.id + ')</small><div class="essay-context">' + blanked + '</div>',
      options: options,
      correctIdx: options.findIndex(o => o.toLowerCase() === blankWord.toLowerCase()),
      answer: blankWord,
      essay: essay
    };
  }
  // Fallback: gen EC question
  return genECQuestion();
}

function genQuestion(filter) {
  if (mode === 'ec') return genECQuestion(filter);
  if (mode === 'ce') return genCEQuestion(filter);
  return genClozeQuestion(filter);
}

function nextQuestion(filter) {
  answered = false;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('nextBtn').disabled = true;
  // Check sub-row active button first (takes precedence)
  if (!filter) {
    const subActive = document.querySelector('#subRow .sub-btn.active');
    if (subActive) {
      filter = JSON.parse(subActive.getAttribute('data-filter'));
    } else {
      const activeBtn = document.querySelector('#filterRow .filter-btn.active');
      if (activeBtn && !activeBtn.textContent.startsWith('全部') && !activeBtn.textContent.includes('▸') && !activeBtn.textContent.includes('▾')) {
        const txt = activeBtn.textContent;
        if (mode === 'cloze') filter = parseInt(txt.replace('#',''));
        else filter = txt[0];
      }
    }
  }
  currentQuestion = genQuestion(filter);
  document.getElementById('question').innerHTML = currentQuestion.prompt;
  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  currentQuestion.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = function() { answer(i); };
    optsDiv.appendChild(btn);
  });
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.opt');
  if (idx === currentQuestion.correctIdx) {
    opts[idx].classList.add('correct');
    stats.correct++;
    stats.total++;
    sessionStreak++;
    if (sessionStreak > stats.bestStreak) stats.bestStreak = sessionStreak;
    document.getElementById('feedback').innerHTML = '<span class="right">✅ 正确！</span>';
  } else {
    opts[idx].classList.add('wrong');
    opts[currentQuestion.correctIdx].classList.add('correct');
    stats.total++;
    sessionStreak = 0;
    document.getElementById('feedback').innerHTML = '<span class="wrong">❌ 错误！</span> 正确答案：<b>' + currentQuestion.answer + '</b>';
  }
  opts.forEach(o => o.disabled = true);
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

// Init
updateStats();
renderFilter();
nextQuestion();
</script>
</body>
</html>
