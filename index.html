let mode = 'ec';
let currentQuestion = null;
let answered = false;
let stats = JSON.parse(localStorage.getItem('quiz_stats') || '{"correct":0,"total":0,"streak":0,"bestStreak":0}');
let sessionStreak = 0;

function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

function randInt(n) { return Math.floor(Math.random()*n); }

function updateStats() {
  document.getElementById('correct').textContent = stats.correct;
  document.getElementById('total').textContent = stats.total;
  document.getElementById('streak').textContent = sessionStreak;
  const acc = stats.total > 0 ? Math.round(stats.correct/stats.total*100) + '%' : '-';
  document.getElementById('accuracy').textContent = acc;
  localStorage.setItem('quiz_stats', JSON.stringify(stats));
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&m==='ec')||(i===1&&m==='ce')||(i===2&&m==='cloze'));
  });
  renderFilter();
  nextQuestion();
}

function renderFilter() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  if (mode === 'cloze') {
    ESSAYS.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = '#' + e.id;
      btn.title = e.title;
      btn.onclick = function() { document.querySelectorAll('#filterRow .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); nextQuestion(e.id); };
      row.appendChild(btn);
    });
  } else {
    const all = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    all.forEach(l => {
      const cnt = WORDS.filter(w=>w.en[0].toUpperCase()===l).length;
      if (cnt === 0) return;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = l + ' (' + cnt + ')';
      btn.onclick = function() { document.querySelectorAll('#filterRow .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); nextQuestion(l); };
      row.appendChild(btn);
    });
    const anyBtn = document.createElement('button');
    anyBtn.className = 'filter-btn active';
    anyBtn.textContent = '全部';
    anyBtn.onclick = function() { document.querySelectorAll('#filterRow .filter-btn').forEach(b=>b.classList.remove('active')); anyBtn.classList.add('active'); nextQuestion(); };
    row.insertBefore(anyBtn, row.firstChild);
  }
}

function pickDistractors(correctWord, count, sameLetter) {
  let pool = WORDS.filter(w => w.en !== correctWord.en);
  if (sameLetter) {
    const letter = correctWord.en[0].toUpperCase();
    const same = pool.filter(w => w.en[0].toUpperCase() === letter);
    if (same.length >= count) pool = same;
  }
  return shuffle(pool).slice(0, count);
}

function genECQuestion(filter) {
  let pool = WORDS;
  if (filter && filter.length === 1) pool = WORDS.filter(w => w.en[0].toUpperCase() === filter);
  const correct = pool[randInt(pool.length)];
  const distractors = pickDistractors(correct, 3, true);
  const options = shuffle([correct, ...distractors]);
  return {
    type: 'ec',
    prompt: '<span class="en">' + correct.en + '</span>',
    options: options.map(o => o.zh),
    correctIdx: options.findIndex(o => o.en === correct.en),
    answer: correct.zh,
    word: correct
  };
}

function genCEQuestion(filter) {
  let pool = WORDS;
  if (filter && filter.length === 1) pool = WORDS.filter(w => w.en[0].toUpperCase() === filter);
  const correct = pool[randInt(pool.length)];
  const distractors = pickDistractors(correct, 3, true);
  const options = shuffle([correct, ...distractors]);
  return {
    type: 'ce',
    prompt: '<span class="zh">' + correct.zh + '</span>',
    options: options.map(o => o.en),
    correctIdx: options.findIndex(o => o.en === correct.en),
    answer: correct.en,
    word: correct
  };
}

function genClozeQuestion(essayId) {
  let essay;
  if (essayId) essay = ESSAYS.find(e => e.id === essayId);
  if (!essay) essay = ESSAYS[randInt(ESSAYS.length)];

  // Find sentences that contain vocabulary words
  const sentences = essay.body.split(/(?<=[.!?])\s+/);
  const vocabLower = new Set(essay.vocabulary.map(v => v.toLowerCase()));

  // Pick a sentence that contains a vocab word
  let attempts = 0;
  while (attempts < 50) {
    const sentence = sentences[randInt(sentences.length)];
    if (!sentence || sentence.length < 20) { attempts++; continue; }
    const sentWords = sentence.match(/[a-zA-Z]+/g) || [];
    const candidates = sentWords.filter(w => vocabLower.has(w.toLowerCase()) && w.length >= 3);
    if (candidates.length === 0) { attempts++; continue; }
    const blankWord = candidates[randInt(candidates.length)];
    const wordData = WORDS.find(w => w.en.toLowerCase() === blankWord.toLowerCase());
    const blanked = sentence.replace(new RegExp('\\b' + blankWord + '\\b', 'i'), '<span class="blank">______</span>');

    // Generate distractors
    let distractors;
    if (wordData) {
      distractors = pickDistractors(wordData, 3, true).map(w => w.en);
    } else {
      distractors = shuffle(WORDS.filter(w => w.en.toLowerCase() !== blankWord.toLowerCase() && w.en.length >= 3)).slice(0, 3).map(w => w.en);
    }
    const options = shuffle([blankWord, ...distractors]);
    return {
      type: 'cloze',
      prompt: '<small>' + essay.title + ' (#' + essay.id + ')</small><div class="essay-context">' + blanked + '</div>',
      options: options,
      correctIdx: options.findIndex(o => o.toLowerCase() === blankWord.toLowerCase()),
      answer: blankWord,
      essay: essay
    };
  }
  // Fallback: gen EC question
  return genECQuestion();
}

function genQuestion(filter) {
  if (mode === 'ec') return genECQuestion(filter);
  if (mode === 'ce') return genCEQuestion(filter);
  return genClozeQuestion(filter);
}

function nextQuestion(filter) {
  answered = false;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('nextBtn').disabled = true;
  const activeBtn = document.querySelector('#filterRow .filter-btn.active');
  if (!filter && activeBtn && activeBtn.textContent !== '全部') {
    const txt = activeBtn.textContent;
    if (mode === 'cloze') filter = parseInt(txt.replace('#',''));
    else filter = txt[0];
  }
  currentQuestion = genQuestion(filter);
  document.getElementById('question').innerHTML = currentQuestion.prompt;
  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  currentQuestion.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = function() { answer(i); };
    optsDiv.appendChild(btn);
  });
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.opt');
  if (idx === currentQuestion.correctIdx) {
    opts[idx].classList.add('correct');
    stats.correct++;
    stats.total++;
    sessionStreak++;
    if (sessionStreak > stats.bestStreak) stats.bestStreak = sessionStreak;
    document.getElementById('feedback').innerHTML = '<span class="right">✅ 正确！</span>';
  } else {
    opts[idx].classList.add('wrong');
    opts[currentQuestion.correctIdx].classList.add('correct');
    stats.total++;
    sessionStreak = 0;
    document.getElementById('feedback').innerHTML = '<span class="wrong">❌ 错误！</span> 正确答案：<b>' + currentQuestion.answer + '</b>';
  }
  opts.forEach(o => o.disabled = true);
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

// Init
updateStats();
renderFilter();
nextQuestion();
</script>
