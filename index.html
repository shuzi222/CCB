<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0f172a; color: #e2e8f0; min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start; padding: 16px;
}
.app { width: 100%; max-width: 600px; }
h1 { text-align: center; font-size: 20px; margin: 12px 0 16px; color: #f1f5f9; letter-spacing: 1px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #1e293b; border-radius: 12px; padding: 4px; }
.tab {
  flex: 1; text-align: center; padding: 10px 6px; border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all .2s; color: #94a3b8; border: none; background: transparent;
}
.tab.active { background: #3b82f6; color: #fff; }
.tab:hover:not(.active) { color: #e2e8f0; }

/* Stats */
.stats { display: flex; justify-content: space-around; margin-bottom: 16px; gap: 8px; }
.stat { background: #1e293b; border-radius: 12px; padding: 12px 16px; text-align: center; flex: 1; }
.stat-val { font-size: 24px; font-weight: 700; color: #38bdf8; }
.stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }

/* Card */
.card { background: #1e293b; border-radius: 16px; padding: 24px; margin-bottom: 12px; }
.question { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 20px; line-height: 1.5; color: #f1f5f9; }
.question .en { color: #facc15; }
.question .zh { color: #38bdf8; }
.question small { font-size: 14px; color: #94a3b8; display: block; margin-top: 4px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 14px 18px;
  cursor: pointer; font-size: 16px; transition: all .15s; text-align: left; width: 100%; color: #e2e8f0;
}
.opt:hover { border-color: #3b82f6; background: #1e293b; }
.opt.correct { border-color: #22c55e; background: #052e16; color: #22c55e; }
.opt.wrong { border-color: #ef4444; background: #450a0a; color: #ef4444; }
.opt:disabled { pointer-events: none; opacity: .7; }
.opt:disabled.correct { opacity: 1; }

/* Feedback */
.feedback { text-align: center; margin-top: 16px; font-size: 15px; min-height: 24px; }
.feedback .right { color: #22c55e; font-weight: 600; }
.feedback .wrong { color: #ef4444; }

/* Next button */
.next-btn {
  display: block; margin: 16px auto 0; padding: 12px 40px; border-radius: 10px;
  border: none; background: #3b82f6; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.next-btn:hover { background: #2563eb; }
.next-btn:disabled { opacity: .3; cursor: not-allowed; }

/* Progress */
.progress { margin-top: 16px; background: #1e293b; border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: #3b82f6; transition: width .3s; border-radius: 8px; }

/* Filter row */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid #475569; background: transparent;
  color: #94a3b8; cursor: pointer; font-size: 13px; transition: all .15s;
}
.filter-btn.active { background: #334155; border-color: #3b82f6; color: #e2e8f0; }

.blank-input {
  background: #0f172a; border: 2px solid #334155; border-radius: 10px; padding: 12px;
  font-size: 18px; color: #facc15; text-align: center; width: 200px; outline: none;
}
.blank-input:focus { border-color: #3b82f6; }

.essay-context { font-size: 15px; line-height: 1.7; color: #cbd5e1; text-align: left; }
.essay-context .blank { color: #facc15; font-weight: 600; border-bottom: 2px dashed #facc15; }
</style>
</head>

const ESSAYS = [{"id": 1, "title": "Fall in Love with English", "body": "Hiding behind the loose dusty curtain, a teenager packed up his overcoat into the suitcase. He planned to leave home at dusk though there was thunder and lightning outdoors. He had got to do this because he was tired of his parents’ nagging about his English study and did not want to go through it any longer. He couldn’t get along well with English and disliked joining in English classes because he thought his teacher ignored him on purpose. As a result, his score in each exam never added up to over 60. His partner was concerned about him very much. She understood exactly what he was suffering from, but entirely disagreed with his idea. In order to calm him down and settle his problem, she talked with him face to face and swapped a series of learning tips with him. The items she set down helped him find the highway to studying English well. The teenager was grateful and got great power from his friend’s words. Now, he has recovered from being upset and has fallen in love with English. 有个少年躲在积满灰尘的松散窗帘后把大衣装入手提箱。尽管外面正打雷闪电，他仍计 划在黄昏时分离家出走。他不得不这样做是因为厌倦了父母对他英语学习的唠叨，不想再忍 受下去了。他的英语学习总是无法取得进展，而且不喜欢参加英语课的学习，因为他以为老 师有意忽视他。结果，他每次考试的分数合计从未超过60。 他的搭档很关心他，也确切地理解他遭受的折磨，但却完全不同意他的想法。为了使他 冷静下来好好解决问题，她和他面对面地交谈，并交换了一系列的学习心得技巧。她写下 来的条款帮助他找到了学好英语的最佳捷径。 这个少年非常很感激，并从朋友的话里获得极大的动力。现在，他已经从沮丧中恢复过来， 真正爱上了英语。", "vocabulary": ["along", "any", "behind", "being", "calm", "curtain", "down", "each", "face", "find", "friend", "from", "great", "highway", "him", "into", "leave", "loose", "lightning", "much", "never", "not", "order", "over", "partner", "power", "problem", "purpose", "result", "Score", "set", "settle", "study", "suitcase", "the", "teenager", "there", "tired", "though", "thought", "through", "thunder", "upset", "very", "want", "well", "what", "with"], "vocab_count": 48}, {"id": 2, "title": "Different Countries Have Different Kinds of Englishes", "body": "Voyages of people from England play an important part in spreading the English language. At present, English is frequently spoken as an official or common language in many countries, such as America, Singapore, Malaysia and some African countries. All based on British English, the English spoken in these countries can be well understood by native English speakers. But actually, these Englishes have been gradually changing in accents, spellings, expressions and the usage of vocabulary. Because of this fact, you can make use of the differences to tell which country the foreigners of your block are from. For example, if a boss fluently commands his driver, “Come up straight to my apartment by elevator and take some gas for my trucks and cabs”, instead of requesting, “Please come to my flat by lift and take some petrol for my lorries and taxis”, you can recognize his American identity, while the latter suggests that he is British. 英国人的航海在英语的传播中扮演了重要的角色。目前，英语在许多国家被作为官方语 言或通用语言频繁地使用，例如美国、新加波、马来西亚和一些非洲的国家。这些国家的 英语都以英式英语为基础，能很好地为以英语为本族语的人所理解。但是实际上，这些英语 在口音、拼写、表达和词汇的使用方面都在逐渐变化。 因为这一情况的存在，你就可以利用这些英语之间的区别说出你们街区的外国人是哪个 国家来的了。例如，如果有个老板流利地命令他的司机：“Come up straight to myapartment by elevator and take some gas for my trucks and cabs（直接搭电梯到我公寓上来拿卡车和出租车 的汽油）”，而不是要求说，“Pleasecome to my flat by lift and take some petrol for my lorries and taxis（请直接搭电梯到我公寓上来拿卡车和出租车的汽油）”，你就可以轻易地辨认出他的 美国人身份，而后者却暗示着那是一位英国人。 A Hard Trip 一次辛苦的旅行 My sister was fond of traveling. Ever since graduating, she had been determined to organize a trip to an old temple. Since transporting fare was expensive, she decided to use a bicycle to cycle there not caring about the disadvantages. Her stubborn attitude was always her shortcoming. Once she made up her mind to do something, no one could persuade her to change her mind. Finally, we gave in as usual though we preferred to take a train. After we prepared everything, including the schedule, reliable weather forecast and the insurance, we began our trip. Our journey was along a river flowing from a high altitude. Our pace was slow because the river frequently had many sharp bends through deep valleys, where the water seemed to boil. Just as I recorded in my journal, it was really a hard journey. But we also enjoyed great views. One night, I put my head on my pillow-a parcel of wool coats, and lay beneath the stars. When the flame in front of our cave went out at midnight, I found the sky so beautiful! 我的妹妹很喜欢旅行。自从毕业以来，她就下定决心要组织一次往一座古庙的旅行。因 为交通费用昂贵，她决定骑自行车去，毫不担心其中的不利情况。顽固的态度一直都是她 的缺点，一旦她下定决心要做的事，就没有人能说服她改变主意。最后，我们像往常一样 让步，尽管我们更喜欢乘火车去。我们准备好了所有东西，包括时间表、可靠的天气预报， 还有保险，就开始了旅程。 我们的旅程沿着一条从高海拔处流下来的河流前行。但我们的步伐很慢，因为当流经深深的 峡谷时，这条河流急转弯很多，急湍的河水都似乎沸腾起来。正如我在旅行日志里记录的那 样，这真是一次艰苦的旅行。但是我们也欣赏到了美丽的景色。一天晚上，我把头枕在一包 羊毛衣服做的枕头上，躺在星空下，当岩洞前的火焰在午夜熄灭时，我发现夜空是如此的美 丽！", "vocabulary": ["actually", "after", "along", "also", "apartment", "attitude", "block", "beneath", "boil", "cave", "change", "come", "common", "could", "country", "cycle", "deep", "example", "ever", "everything", "fact", "fare", "fond", "for", "forecast", "flame", "flat", "found", "from", "front", "gradually", "great", "her", "hard", "hers", "high", "head", "identity", "important", "instead", "insurance", "journal", "just", "lay", "language", "latter", "lift", "make", "midnight", "mind", "native", "night", "not", "once", "official", "organize", "our", "ours", "pace", "part", "persuade", "petrol", "people", "pillow", "play", "please", "present", "put", "recognize", "river", "schedule", "sharp", "sky", "slow", "since", "sister", "some", "something", "straight", "such", "tell", "temple", "take", "that", "the", "there", "these", "though", "through", "trip", "train", "use", "usual", "vocabulary", "weather", "water", "well", "when", "where", "which", "while", "wool", "yours"], "vocab_count": 103}, {"id": 4, "title": "A Horrible Earthquake", "body": "Dirty water rose in wells and canals before the earthquake. But no one judged that an earthquake was coming. Suddenly, everything shook. It seemed as if the world was at an end. Millions of brick houses and a number of dams were destroyed. Railway tracks became useless bars. Pipes in mines burst and let out smelly steam. Huge cracks trapped cyclists everywhere. The next day, this event was the headline or main title of all newspapers. With the reporters giving an outline of the disaster, the whole nation was shocked by the damage and the victim’s extreme suffering. People were moved when they read that the survivors comforted each other by saying “Congratulations! You survived!”. So they not only expressed their sympathy sincerely, but also organized together to help the victims right away. The injured were rescued and the dead were buried. The frightened survivors were dug out from under the ruins and were offered shelter, fresh water and electricity. Thanks to people’shelp, the loss was minimized. 地震前，水井和运河里的污水都涨涌起来。但是却没人判断出地震即将来临。霎那间， 一切都在摇晃，似乎整个世界就要结束。数以百万的砖房和许多水坝遭到破坏；铁路轨道 都变成无用的铁条；煤矿管道纷纷爆裂，发出有臭味的蒸汽；到处都有骑车的人被巨大的 裂缝陷住。 第二天，所有报纸都纷纷以大字标题或主要标题报道了这一事件。记者们描述了灾难的大 概情况，全国都被地震的破坏和灾民们极度的苦难所震惊。当人们读到幸存者以“恭喜啊， 你还活着。”来互相安慰时，都被感动了。人们不仅衷心地表达了他们的同情，而且还立刻 组织起来帮助灾民。伤员被救助了，死者被埋葬了，吓坏的幸存者被从废墟中挖出来了， 栖身处、净水和电力也很快得到提供。多亏了人们的帮助，灾区的损失被减到了最小。 The Great President 伟大的总统 As the founder of the republic, the president had many good qualities. Before coming to power, he was a generous lawyer. He was willing to selflessly help everyone who turned to him. He accepted no fee to offer legal guidance and opinions to those who were out of work or uneducated. Later, believing all mankind to be equal, he devoted himself to stopping the unfair anti-black laws. He set up the Black Youth League and was voted to be the leader. However, though he kept peaceful principles without violence and terror, his mean enemies still blew up his house and attacked his relatives, and he himself couldn’t escape being sentenced to 30 years in prison. Not fearing of the prison guards’ cruelty, he kept active and begged no mercy from them. As a matter of fact, he was always hopeful and never lost heart during the stage even though he was in trouble. Finally, people rewarded him with the leader’s position and a gold blanket. 作为共和国的创始人，这位总统具备许多的优秀品质。还在掌权之前，他就是一位慷慨 的律师。他愿意无私地帮助那些向他求助的人。他免费为失业的，或没有受过教育的人提 供法律指导和意见。后来，因为相信所有人类都是生来平等，他全身心投入到废除不平等 的反黑人法律工作中。他建立了黑人青年团并被选为领袖。然而，尽管他坚持没有暴力、没 有恐怖的和平原则，卑鄙的敌人还是炸毁了他的家、袭击了他的亲属，他自己也无法逃脱 被判30 年徒刑的遭遇。 在狱中，他毫不畏惧狱警的残酷，始终保持积极的态度，不向他们乞求怜悯。实际上， 他在任何一个困境时期都充满着希望，从未灰心。 最后，人们以领袖的职位和一块金毯子回报了他的贡献。 A Brave Maid 勇敢的女仆 A wooden vase from the Ming Dynasty at the entrance of the reception hall amazed everyone. The artists designed it in a rare style and selected valuable jewels to decorate it. People thought highly of its fancy colour of honey and the beautiful paintings on it. The vase used to belong to a former castle. But when the country was at war, the enemy troops exploded the castle. Debates on how the vase survived went on and on. In order to remove people’s doubt, a team of no less than 20 people carried out an informal investigation. The evidences they found showed that a maid took the vase apart and asked a sailor to sink it in a local well. She never gave away the secret even under the cruel trial of the enemies who were in search of treasures. It is worth giving this brave maid a fortune in return. 接待大厅入口处的明朝木制花瓶使每个人都惊奇不已。艺术家以一种罕有的风格设计它， 并挑选了贵重的珠宝装饰它。人们高度赞赏它那蜂蜜般的奇特颜色，还有上面绘制的绘画。 这个花瓶曾经属于一座从前的城堡，但在战争期间，敌人的军队炸毁了城堡，于是关于 这个花瓶是如何幸存下来的争论就一直在持续着。为了解开人们的疑问，一个由不少于20 人的调查队开展了一次非正式的调查。他们找到的证据表明，有个女仆把花瓶拆开，然后让 一名水手把它沉到当地的一个水井里。她从来没有泄露这个秘密，即使是在搜寻财宝的敌人 残酷的审讯下。 这位女仆值得给予一大笔钱作为对她的回报。 A Fair Competition 公平的比赛 Swifter, Higher and Stronger stands for the spirit of the Olympics. But fairness is the basis of this motto. Only when you win fairly will you and your homeland deserve the great glory. But nowadays, unlike the ancient honest slave competitors, some hopeless athletes who can’t bear the pain of training cheat when taking part in games. Medals seem to have magical power causing them to cheat, and the prize money has replaced the motto as their only goal. So, in the gymnastics event to be held in our city next month, one of the host’s responsibilities is to keep competitions fair. They advertised on posters outside the stadium to promise that every competitor is to have a regular physical examination in a gymnasium one after another. No one can bargain on this. The volunteers in charge will be very strict. It is foolish to cheat because they will not be admitted to compete and will even be fined as well. “更快！更高！更强！”代表着奥运精神。但是公平却是这一格言的基础。只有当你公平 地赢得比赛，你和你的祖国才会承受这样的光荣。但如今，不像古代那些诚实的奴隶参赛 者，有些没有希望的运动员无法承受训练的痛苦，于是在参加比赛时作假。奖牌似乎有某 种魔力使他们作假，奖金也已经代替了奥运格言成为了他们唯一的目标。 因此，在我们市下个月即将举行的一场体操赛事中，主办方的其中一项责任就是要确保比赛 的公平。他们在体育场外的海报上做广告，承诺说每个参赛者都将在体育馆一个一个地参 加常规的身体检查。对此没有人可以讨价还价。负责此事的志愿者将非常严格。作假是很 愚蠢的，因为他们将不被允许去竞赛，甚至还将被罚款。", "vocabulary": ["after", "ancient", "another", "also", "apart", "away", "bear", "before", "black", "being", "blanket", "belong", "brick", "brave", "castle", "charge", "cheat", "city", "compete", "country", "cruel", "decorate", "damage", "day", "dead", "deserve", "dirty", "disaster", "doubt", "during", "dynasty", "each", "earthquake", "end", "enemy", "electricity", "entrance", "equal", "escape", "even", "event", "every", "everyone", "everything", "everywhere", "fact", "fee", "fair", "fancy", "for", "former", "fortune", "found", "fresh", "from", "glory", "goal", "gold", "goods", "great", "hall", "him", "headline", "house", "homeland", "however", "honest", "huge", "honey", "informal", "lawyer", "league", "legal", "let", "local", "main", "mean", "means", "mankind", "mercy", "matter", "month", "motto", "nation", "never", "next", "not", "only", "offer", "order", "outline", "outside", "other", "our", "ours", "pain", "part", "physical", "people", "position", "prison", "power", "prize", "president", "promise", "railway", "rare", "read", "regular", "reception", "remove", "republic", "right", "return", "rose", "saying", "search", "secret", "seem", "shelter", "set", "sink", "some", "spirit", "stadium", "stage", "strict", "steam", "still", "style", "sympathy", "than", "that", "team", "the", "their", "them", "they", "title", "those", "though", "thought", "together", "trouble", "unfair", "under", "unlike", "used", "victim", "vase", "violence", "very", "war", "water", "well", "with", "when", "without", "who", "work", "whole", "World", "Worth", "will", "win", "yours", "youth"], "vocab_count": 167}, {"id": 8, "title": "Computers", "body": "The goal of early calculating machines was to simplify difficult sums. But with the help of new technology, electronic chips replaced tubes and a revolution of artificial intelligence has arisen. From then on, the appearance of computers totally changed our lives. They can not only download information from the wet when connected by the network or mobile phone signals, but also solve different types of logical problems. With operators as their coaches, they can even control rockets to explore the moon and instruct androids with the human race’s characters to mop floors and watch over your naughty niece. Anyhow, computers are so helpful that they do bring happiness. However, computers are easily attacked by viruses. This reality has become a hard-to-deal with-problem. As a result, computers are dangerous in a way. So, personally, I worry about their universal applications in some fields, such as finance. 早期计算机器的目的是简化比较难的计算。但是在新技术的帮助下，电子芯片代替了电 子管，一场人工智能革命由此掀起。从那时起，电脑的出现完全改变了我们的生活，它们 不仅能在网络或移动电话信号的连接下从网上下载信息，而且可以解决各种类型的逻辑问 题。在操作员的教练下，它们甚至还可以控制火箭探索月球，指导具有人类性格的机器人 擦洗地板和照顾你调皮的侄女。不管怎么说，电脑都是如此的有用，以致的确给人们带来 了快乐。 然而，电脑很容易受到病毒的攻击，这一现实已经成为一个难以处理的难题，结果，电脑在 某种程度上是很危险的。因此，就个人而言，我很担心电脑在某些领域，例如金融方面的广 泛应用。 保护野生动植物 Wildlife Protection Dinosaurs died out because of an unexpected incident. But wildlife today disappears or is in danger just because humans do harm to it. For example, tigers are hunted for fur to make carpets so that they can only live in secure reserves; grassland is destroyed without mercy so that dust storms come into being affecting distant cities. Last year, scientists saw some monkeys rubbing themselves with a certain kind of insects to protect themselves from fierce mosquitoes biting. According to the result of the inspection, they found that the insect contains a powerful drug, so local farmers were employed to catch the insects. The ending was that the insects disappeared from the whole zone. When told that it was a loss to humans, the farmers burst into laughter and responded, “Our real loss is our decreasing income.” We should appreciate the natural balance and pay more attention to the importance of wildlife protection. Not until we succeed in letting wildlife live in peace, can we smile in relief. 恐龙因一次意外事件而灭绝，但是今天的野生动植物却是因为人类的伤害而消失或处在 危险中。例如，老虎被猎杀以获取做地毯的皮毛，以致它们只能生活在安全的保护区里； 草地被毫不怜悯地破坏，以致沙尘暴开始影响遥远的城市。 去年，科学家观察到猴子在身上擦某种昆虫来保护自己不受凶猛的蚊子的叮咬。根据检 查的结果，他们发现这种昆虫含有一种具有强大效力的药物，于是，当地的农民都被雇来抓 虫子。结果是，这种昆虫从这整个地区都消失了。当被告知说这是整个人类的损失时，农民 们都突然大笑着回应道：“我们减少的收入才是我们真正的损失呢！” 我们应该意识到自然平衡的重要，更加注意野生动植物的保护。直到我们成功让野生动 植物安详平静地生活，我们自己才能如释重负地笑开颜。 My First Band 我的第一支乐队 I was very sensitive to music. Just dipping into the music books briefly, I could sing or play well. To be honest, I always dreamt of becoming a famous folk actor. I was so confident that I never decreased my devotion. I formed my first band called “Rolling Frog”. At the beginning, we relied on performing on instruments in pubs or to passers –by to earn extra money in cash. Then we wore false beards to pretend to be the musicians whom people were familiar with. In addition, we attached humorous acts to our performances and played jokes on each other. Soon, our “funny jazz” became famous and invitations to perform for broadcast stations began to come. Afterwards, we sorted out attractive music and made a record in a studio. A million or so copies were sold and we became millionaires. It was painful that the band broke up finally. But above all, I realized my dream to be a musician. 我对音乐很敏感，只要简要地浏览一下乐谱，我就能演唱或演奏得很好。说实话，我一 直都梦想着能成为出名的民间演员，自信的我从未减少过热爱。 我组成的第一支乐队叫做“摇滚蛙”。开始，我们依靠在酒吧里或向路人表演乐器来挣些 零花的现金。然后我们带上假胡子假扮人们熟悉的音乐家，除此之外，我们在表演中加上 幽默的动作，互相开着玩笑。很快，我们的“滑稽爵士乐”出了名，到广播电台表演的邀请开 始多起来。随后，我们把我们吸引人的音乐做了分类，在一间音乐工作室录制了1 张唱片， 大约卖出了100 万张，这使我们都成了百万富翁。 乐队最终的解散让我很心痛，但最重要的是，我实现了自己当音乐家的梦想。", "vocabulary": ["above", "according", "also", "anyhow", "appreciate", "attention", "artificial", "band", "balance", "being", "bring", "broadcast", "cash", "catch", "certain", "come", "control", "could", "danger", "deal", "difficult", "dream", "drug", "download", "dust", "each", "early", "earn", "electronic", "example", "even", "explore", "extra", "false", "familiar", "finance", "first", "for", "found", "folk", "frog", "funny", "from", "goal", "hard", "harm", "however", "honest", "human", "incident", "inspection", "income", "information", "insect", "into", "jazz", "just", "kind", "last", "local", "logical", "live", "make", "mercy", "mobile", "moon", "mop", "million", "more", "music", "network", "never", "naughty", "new", "newS", "niece", "not", "only", "over", "other", "our", "ours", "pay", "peace", "people", "perform", "play", "problem", "pretend", "protect", "race", "real", "relief", "record", "revolution", "result", "secure", "sensitive", "should", "smile", "sing", "solve", "some", "sOon", "studio", "Succeed", "such", "that", "the", "their", "technology", "then", "they", "very", "way", "watch", "well", "wet", "with", "when", "without", "whole", "whom", "worry", "year", "yours", "zone"], "vocab_count": 127}, {"id": 11, "title": "An Interesting Festival", "body": "The Agricultural Feast takes place after the Independence Day. It is not a worldwide celebration. Only Christians in Mexico look forward to its arrival for its religious origin. Long ago, humans’ ancestors were bad. They fooled and played tricks on each other and never kept their word. So God turned up and drowned all their crops. Humans starved day and night, weeping. In order to gain God’s forgiveness, a woman poet set off to see God. She admired God and kept apologizing. God was moved. With his permission, humans finally had good harvests again. So, to wipe sadness and remind themselves of the belief in God, people began the festival. On the festival, people gather in open air, such as playgrounds or parking lots, and energetically have fun with each other all night long, as though they were never tired. When a beauty dressed up in lovely clothing reads poems in memory of the poet, everyone holds their breath. Then, it is the custom that the bone of a rooster head is given to her as an award. Obviously, the story is not true, but the festival is interesting. 农业盛会在独立日后举行。它不是一个世界性的庆典，由于它的宗教起源，只有墨西哥 的基督徒才盼着节日的到来。 很久以前，人类的祖先很坏，他们互相欺骗，耍诡计，从不遵守诺言。于是，上帝出现 了，淹死了他们所有的作物。人们日夜挨饿，哭泣着。为了获得上帝的原谅，一位女诗人 出发去见上帝。她对上帝的赞美和怀有的歉意感动了上帝，有了他的允许，人类终于又获得 了丰收。因此，为了抹去忧伤并提醒自己对上帝的信仰，人们开始举办这个节日。 在节日那天，人们聚集在露天场所，例如操场或停车场，通宵达旦地玩得非常开心，精 力充沛的人们似乎不知疲倦。当一位用可爱的衣服盛装打扮的美女朗读诗歌以纪念那位诗 人时，在场的每个人都屏住了呼吸，然后，按照风俗，将奖励给她一只公鸡的头骨。 很明显，这个故事不是真的，但是节日却很有趣。", "vocabulary": ["again", "after", "ago", "air", "award", "bad", "beauty", "belief", "bone", "breath", "custom", "day", "each", "everyone", "festival", "for", "forward", "fun", "gain", "gather", "god", "goods", "her", "hers", "head", "long", "memory", "never", "night", "not", "only", "off", "order", "origin", "other", "people", "place", "poet", "remind", "set", "story", "such", "that", "the", "their", "then", "they", "tired", "though", "true", "wipe", "with", "when", "woman", "word"], "vocab_count": 55}, {"id": 12, "title": "Balanced Diet", "body": "Wang Peng earned his living by running a barbecue restaurant, which served delicious bacon, fried chicken breast and mutton roasted with pepper and garlic. But his food and discount attracted fewer and fewer customers. Finally, he was in debt. Yong Hui’s slimming restaurant served fresh peas, carrots, eggplants, and raw cucumbers with vinegar. As the hostess, she said fibres benefited customers' digestion the most. In order not to let Yong Hui get away with telling lies, Wang Peng spied on Yong Hui despite her glare. But he was surprised that she was losing her customers, too. Curiosity drove Wang Peng to consult an expert. The expert sighed and said, ―Both of your menus have weakness and limited strength. Your customers put on weight too easily, while Yong Hui’s lose weight too quickly. So, Wang Peng, cut down the fat of your food and increase vegetables and fruits, like nuts, beans, mushrooms, peaches and lemons. You ought to combine the two menus and provide a balanced diet. ” Before long, Wang Peng won his customers back. 王鹏经营一家烧烤餐厅来谋生，他的餐厅供应美味的腊肉、油炸的鸡胸，还有用辣椒和 大蒜一起烤制的羊肉。但是，他的食物和折扣吸引的顾客越来越少，最后是他负债累累。永 慧的减肥餐厅供应的是新鲜的豌豆、红萝卜、茄子和醋腌的生黄瓜。作为老板娘（女主人）， 她总是说食物纤维才最有利于顾客的消化。为了不让永慧说了谎不受惩罚,王鹏不顾她的怒 视，前去探查个究竟。但是让他惊奇的是，永慧的顾客也在严重地流失。 好奇心驱使王鹏去咨询专家。那位专家叹息着说：“你们俩的菜单都缺点明显、优点有限。 你的顾客很容易就发胖，而永慧的顾客体重却减轻得太快。所以嘛，王鹏，你要减少你的食 物中的脂肪含量，增加蔬菜和水果，例如坚果、豆类、蘑菇、桃子和柠檬之类。你应该把两 份菜单结合起来，给顾客提供平衡的膳食。” 不久，王鹏就赢回了他的顾客。", "vocabulary": ["away", "back", "bacon", "barbecue", "before", "both", "breast", "chicken", "combine", "consult", "cut", "debt", "despite", "discount", "diet", "down", "expert", "fat", "food", "fresh", "garlic", "her", "hers", "increase", "let", "long", "lose", "most", "mutton", "not", "order", "pepper", "provide", "put", "raw", "restaurant", "that", "the", "with", "which", "while", "yours"], "vocab_count": 42}, {"id": 13, "title": "Sailing Home", "body": "This novel was about an unbelievable but genuine adventure. Its author was a black businessman who was brought up in America. In 1956,he visited Africa, his birthplace. One day, when he was wandering on the pavement near the bay enjoying the sea scenes, he lost his money and passport that he kept in an envelope. So he went to the embassy to seek help, but the ambassador with rude manners didn’t permit his staff to help though he bowed to him. Staring at his impatient face, he understood that it was the fault of his skin colour that accounted for their refection. So he decided to take a chance to sail on a small boat home. He met a large amount of difficulty but was never stopped. On the contrary, difficulty pushed him to go ahead harder. Three months later, he was spotted by a ship by accident. He was in rags indeed. A maid even screamed when bringing him a steak and pineapple dessert. Aboard, he earned his passage by working as a barber and got home finally. As for the name of his novel, he couldn’t think of a better one than the phrase “Go Ahead”. 这部小说写的是一次令人难以置信而又真实的历险。其作者是一位在美国被抚养长大的 黑人商人。1956 年，他回到他的出生地非洲。有一天，当他在海湾边的人行道上漫步欣赏 海景时，他丢失了一个装着钱和护照的信封，于是向当地的大使馆寻求帮助。但是大使态度 非常粗鲁，即使向他鞠躬，也不允许他的职员帮忙。盯着他那不耐烦的脸，他知道是他皮肤 颜色的错才导致了他们的拒绝。于是，他决定冒险驾驶一只小船回家。 他遇到了许多困难，但是从未停止，相反，困难推动他更努力地前进。三个月后，当他被 一艘船偶然发现时，真的是衣衫褴褛。给他端来牛排和菠萝甜品的女仆甚至被吓得尖叫起 来。在船上，他当一名理发师来挣取船费，最后终于回到了家。至于这部小说的名字，他再 也不能想到一个比“前进”更好的短语了。", "vocabulary": ["aboard", "accident", "adventure", "ahead", "amount", "author", "bay", "black", "boat", "better", "businessman", "chance", "contrary", "day", "dessert", "envelope", "even", "face", "fault", "for", "genuine", "him", "indeed", "large", "never", "near", "novel", "passage", "passport", "permit", "phrase", "rude", "sail", "sea", "seek", "ship", "skin", "small", "staff", "steak", "take", "than", "that", "the", "their", "think", "though", "with", "when", "who"], "vocab_count": 50}, {"id": 14, "title": "Explore MKII", "body": "MKII, a planet billions of kilometers away, is the origin of life in many religions. Physicists have proved the theory that its gentle climate and the pull of its gravity are similar to the earth’s. And astronomers have found that oxygen atoms and carbon dioxide, which are fundamental to life, exist in its atmosphere through satellites. Cheered up by this news, biologists, in their turn, began to do some research to remove people’s puzzles—Now that there are some suitable conditions, does life really exist on this globe? Do they multiply by laying eggs or giving birth to babies? Last month, a spaceship was sent there. It’s a pity that this mission failed. Unlike the earth, MKII is a much younger planet. Thus, masses of harmful acid clouds float everywhere causing violent chain reactions to break out. These clouds not only blocked out the pilots’ sight but also damaged the engine system. Luckily, the pilots watched out carefully and prevented the spaceship from crashing in time. MK 二号是一颗几十亿公里外的行星，它在许多宗教里都是生命起源的地方。物理学家 已经证明了它温和的气候和重力的牵引都和地球相似的理论；天文学家也通过卫星，在它 的大气层里发现了氧原子和二氧化碳的存在，这些都是对生命来说，都是基本的。受到这一 消息的鼓舞，生物学家们接着开始了研究以解开人们的迷惑——既然有了适合的条件，生命 真的存在于这个星球吗？他们是通过下蛋，还是产仔来繁殖后代的呢？ 上个月，一艘太空飞船被派到了那儿。可惜的是，这次任务失败了。不像地球，MK 二号 是一颗年轻得多的行星。因此，大团大团的有害酸云到处漂浮，引起猛烈的连锁反应的爆 发。这些云团不仅阻挡了飞行员的视线，而且还损坏了发动机系统。幸运的是，飞行员小心 注意，才及时阻止了飞船的坠毁。", "vocabulary": ["acid", "also", "atmosphere", "away", "birth", "break", "carbon", "chain", "climate", "earth", "engine", "exist", "everywhere", "found", "fundamental", "from", "gentle", "globe", "gravity", "last", "life", "month", "mission", "much", "not", "only", "origin", "oxygen", "people", "pity", "planet", "pull", "remove", "research", "sight", "similar", "spaceship", "some", "System", "that", "the", "their", "theory", "there", "these", "they", "time", "through", "turn", "unlike", "violent", "which"], "vocab_count": 52}, {"id": 15, "title": "A Journeyacross Canada", "body": "After a quiz last autumn, Kuang crossed the continent eastward to Toronto to visit his schoolmate, the distance measuring approximately 5,000 kilometers. His train started from Vancouver, acity surrounded by mountains. After confirming his baggage was aboard the train, Kuang settled down in his seat. Having a gift for communication, he started chatting with another passenger within 5 minutes. Their topics included the Canadian traditions, the Prime Minister, the mixture of races, and the terrifying Great Fall. After a nice buffet at noon, he was pleased to find that the scenery was impressive. He saw beautiful harbours in the distance, wealthy urban areas and maple forest that covered thousands of acres. He even managed to catch sight of an eagle flying upward over bushes. Kuang reached Toronto which lies slightly near the border at a misty dawn. There was frost and the broad downtown streets were very quiet. Though it was early, Kuang phoned his schoolmate in a booth nearby at once rather than waiting for him to come. They had a good time together. 去年秋天的一次考试后，光向东横穿整个大陆，来到多伦多探望他的同学，这次旅行的 距离测量起来大约有五千多公里。 他的火车从群山围绕的温哥华启程。在证实了自己的行李都在火车上之后，光就在座位 上安坐下来。因为在与人交流方面有天赋，他在5 分钟内就和另一个乘客聊起天来。他们 的话题包括加拿大的传统、加拿大的总理、种族的混合，还有让人心惊胆战的大瀑布。中 午吃了一顿美味的自助餐后，他很高兴发现外面的风景非常让人印象深刻。他看见了远处 美丽的海港、富裕的市区，还有延绵几千亩的枫树林，他甚至还设法看见了一只在灌木丛 上空翱翔的鹰。 光在一个薄雾笼罩的黎明到达稍稍接近边境的多伦多，地上有霜，宽阔的市区街道很安静。 尽管还很早，光却不愿等待，立刻就在附近电话亭给同学打了个电话。他们在一起度过了美 好的时光。", "vocabulary": ["aboard", "after", "another", "border", "broad", "buffet", "catch", "come", "continent", "distance", "down", "downtown", "eagle", "early", "even", "fall", "find", "for", "forest", "frost", "from", "gift", "goods", "great", "him", "last", "minister", "near", "nearby", "nice", "noon", "once", "over", "passenger", "prime", "quiet", "quiz", "rather", "seat", "sight", "than", "that", "the", "their", "there", "they", "time", "though", "together", "train", "urban", "very", "visit", "with", "within", "which"], "vocab_count": 56}, {"id": 16, "title": "A Woman Doctor Lina", "body": "Born in a pigs’ nest, Lina led a poor life in her childhood. She was looked down upon by the children of her generation. But she intended to become a doctor after she came across Lin Qiaozhi by chance, who was delivering medical courses to an audience crowding around her. Before moving off, Lin inspired her to carry on her study. With Lin’s support, Lina entered an institute and studied hard sparing no time for entertainment. Her being outspoken and modest won respect for her. Her excellent arguing skills and observation ability put others into the shade. Now, Lina has become a specialist in human beings’ emergency sickness. Her kindness and considerate behavior to the poor were well known. The organization she founded carried out campaigns and welfare projects to help cut the death rate for the poor. Her job was hard but worthwhile. She often refers to the connection between her achievement and Lin Qiaozhi, and says that her poor childhood is the bond between her and the poor. 丽娜出生在猪圈里，童年过着贫穷的生活，被和她同辈的孩子看不起。但是在她偶然遇 见了林巧芝之后却打定注意想要成为一名医生，当时林巧芝正在给拥挤在她身边的观众传授 医疗课程，在离开之前，林巧芝鼓舞她继续坚持学习。在林的支持下，丽娜进入了一所学院。 她努力学习，毫不浪费时间玩闹娱乐。她的坦诚和谦虚为她赢得了尊敬，她优秀的辩论技巧 和观察能力使其他的人都黯然失色。 现在，丽娜已经成为一名人类紧急病症专家。她对穷人的好心和考虑周到的一举一动都 众所周知，她建立的组织开展各种活动和福利项目来为穷人减少死亡率。她的工作艰苦却很 值得。她常常提到她的成就和林巧芝之间的联系，还总是说她贫穷的童年就是她与穷人之间 的纽带。", "vocabulary": ["after", "around", "audience", "before", "behavior", "being", "between", "bond", "born", "carry", "came", "childhood", "chance", "cut", "death", "down", "emergency", "entertainment", "excellent", "for", "generation", "her", "hard", "hers", "human", "institute", "into", "job", "life", "medical", "nest", "often", "off", "organization", "poor", "put", "rate", "respect", "shade", "study", "support", "that", "the", "time", "upon", "welfare", "well", "with", "who", "worthwhile"], "vocab_count": 50}, {"id": 17, "title": "A New Farming Way", "body": "Tuan was a farmer in Vietnam. For decades, he had been struggling to rid his family of hunger. However, it always confused him how to expand the output of his crops. This disturbing problem led to his regretting being a farmer. He would rather have chosen another job. One day, when skimming through a newspaper, Tuan read a comment on Yuan Longpin. He underlined Yuan’s nationality and occupation, and then focused on his discovery and the statistics of his research. He found the knowledge Yuan circulated very practical. Therefore, he made a summary and began to build up a new farming method. He planted super grain of rich nutrition and equipped himself to keep his crops roots free from bacteria and pests. He also enriched minerals in the soil while reducing chemical fertilizers. Though it cost him more time and freedom, he was full of hope. The next year, Tuan was sun burnt but satisfied with his production very much. Thanks to Yuan Longpin, he not only won the battle against hunger, but he could also export his crops abroad. 俊是一名越南的农民，几十年来，他都一直在努力使家人摆脱饥饿。然而，如何扩大他 的农作物产量这一问题却一直在困扰着他。这个恼人的问题导致了他后悔当一名农民，而宁 愿自己当初选择其它的工作。 一天，俊在浏览报纸的时候，读到一篇关于袁隆平的评论。他在袁的国籍和职业下面划 了线，然后将焦点集中在他的发现和研究数据上。他发现袁传播的知识非常实用，因此， 他做了摘要，并开始建立一种新的耕作方式。他种植营养丰富的超级谷物，添置设备以使 作物的根部免受细菌害虫的伤害；他还增加土壤所含的矿物质，同时减少化学肥料的使用。 尽管耗费了他更多的时间和自由，他却充满着希望。 第二年，俊被晒黑了，但是却对自己的生产非常满意。多亏了袁隆平，他不仅赢得了对抗 饥饿的战斗，而且还将自己的作物出口到国外呢。", "vocabulary": ["abroad", "against", "another", "also", "battle", "being", "comment", "cost", "could", "day", "expand", "export", "family", "farmer", "for", "found", "free", "full", "from", "grain", "him", "however", "job", "method", "more", "much", "new", "newS", "newspaper", "next", "not", "nutrition", "Occupation", "only", "output", "practical", "problem", "rather", "read", "rich", "research", "soil", "summary", "sun", "super", "the", "then", "therefore", "time", "though", "through", "very", "with", "when", "while", "Would", "year"], "vocab_count": 57}, {"id": 18, "title": "Chaplin - AGreat Master of Humour", "body": "Chaplin was an extraordinary performer who starred in and directed many outstanding comedies. Few were bored watching his moustache, his gestures or his entertaining reactions when chased by detectives. Being drunk, sliding on a banana skin or whispering his own failures to nobody, he made us feel more content with our life without any verbal explanation. His particular sense of humor has astonished everybody throughout the world up to now. In a small budget film, he played a badly-off and homeless person wearing worn-out shoes and messy clothes. On one occasion, he was trapped by a snowstorm in a vast mountainous area. Though he overcame many difficulties, he wasn’t fortunate enough. With all the porridge eaten up, he picked out a shoe and boiled it to eat. He cut off the leather bottom and chewed it like a pancake. According to an actress, his acting was so convincing and amusing that everybody couldn’t help bursting into laughter. 卓别林是一名非凡的演员，他主演并导演了多部杰出的喜剧。看见他可笑的小胡子、滑 稽的手势动作，还有面对警探的追捕时有趣的反应，很少有人会觉得厌烦。喝醉酒啦，踩 到香蕉皮滑倒啦，或者自言自语（低语）自己的糗事啦，他无需任何语言解释的表演总是使 我们对自己的生活感到更加满意。他独特的幽默感直到现在依然使世界各地的人们都感到 惊讶。 在一部小预算的电影里，他穿着磨破的鞋子和脏兮兮的衣服，扮演了一名贫穷又无家可归 的人。在一幕场景中，他被一场暴风雪困在一片多山的区里。尽管他克服了许多困难，但是 他还是运气不好的。粥都吃完了，他只好挑出一只鞋子煮来吃。他切下皮革的鞋底，像烙饼 一样地咀嚼起来。据一名女演员所说，他的表演是如此地令人信服而又逗人发笑的，以致 在场的所有人都忍不住大笑起来。", "vocabulary": ["according", "any", "banana", "badly", "being", "budget", "content", "cut", "enough", "extraordinary", "feel", "few", "film", "into", "leather", "life", "more", "nobody", "Occasion", "off", "outstanding", "our", "ours", "own", "particular", "pancake", "person", "sense", "shoe", "skin", "small", "that", "the", "though", "throughout", "vast", "with", "when", "without", "who", "World"], "vocab_count": 41}, {"id": 19, "title": "A Misunderstanding", "body": "Ingeneral, spoken statements are the major way of communication, but body language and facial expressions also have such kinds of function. For example, yawning means being not interested and turning one’s back to someone or swinging your fist shows your anger. But what those gestures really mean is subjective in different cultures. Thus, misunderstandings happen now and then in today’s world of cultural crossroads. Once, representing the Adults’ Education Association, I went to the airport to meet an official of high rank from Columbia and take him to his dormitory and then to the canteen. After the flight arrived, I saw a man looking around curiously. So I approached to greet him. He suddenly dashed to hug me and kissed me on both cheeks. As a young girl, I felt truly embarrassed and put up my hands to defend myself. His false smile told me that he had lost face. Later, I received a cassette from him, in which he recorded his apology. On hearing that Columbians were more likely to kiss others, I soon felt at ease. 通常说来，口头表达是人们交流的主要方法，但是肢体语言和面部表情也有这种功能。 例如，打哈欠意味着不感兴趣，背对别人或向其挥舞拳头表达的是愤怒。但是在不同的文化 中那些手势表达的真正意思是很主观的。由此，误会就时不时地发生在今天这个文化交叉碰 撞的世界里。 有一回，我代表成人教育协会到机场去接一位从哥伦比亚来的高级官员，我得带他到宿 舍和食堂。当他的航班到达时，我看见一名男子好奇地东张西望，于是走上前去和他打招 呼。他突然猛冲过来拥抱我，还亲了我的脸颊。还是个年轻姑娘的我感到真尴尬，不由自主 举起手来保护自己。他的假笑告诉我他感到丢了面子。 后来，我收到他送来的一盒磁带，里面录了他的道歉。当听到这只是因为哥伦比亚人更倾 向于见面时互相亲吻时，我很快就感到轻松安心了。", "vocabulary": ["after", "airport", "also", "association", "around", "back", "being", "both", "canteen", "defend", "embarrassed", "ease", "example", "face", "false", "for", "fist", "flight", "function", "from", "girl", "greet", "happen", "high", "him", "hug", "language", "mean", "major", "means", "meet", "more", "not", "once", "official", "put", "rank", "smile", "sOon", "subjective", "such", "take", "that", "the", "then", "those", "way", "what", "which", "World", "young", "yours"], "vocab_count": 52}, {"id": 20, "title": "A Unique Theme Park", "body": "As soon as our shuttle got close to the theme park by the freeway, everyone came to life and put on cloth sneakers in advance for an outing. Our translator paid for the admission, and we started enjoying the various attractions in the sunlight. According to the travel brochure, this unique park is famous for its well preserved minority culture. We experienced many deeds of the early settlers, such as swinging across rivers, hunting creatures in the jungle, or taking part in swords fighting tournaments. This park is also famous for its wooden souvenirs. Whichever we bought in the central shop was made of wood, and wherever we went we could see minority carpenters working. They made wooden tools, wooden cartoon figures, wooden athletic products and so on. They even built a huge wooden engine with a length of 20 metres, which was modeled after a real one. This theme park is really a fantasy amusement park. No wonder it has become the brand of local tourism. 我们走高速公路的来往穿梭巴士一接近主题公园，大家都活跃了起来，并且提前穿上了 布鞋，做好这趟外出旅游的准备。翻译付了入场费后，我们就开始在阳光下欣赏各种各样 吸引人的东西。 根据旅行手册的介绍，这个独一无二的公园因其得到良好保护的少数名族文化而闻名。 我们体验了许多早期定居者所做的事，如荡过河啦，在丛林中猎杀动物啦，或者参加剑术比 赛啦等等。 这个公园还因为它的木制纪念品而闻名，我们在中心商场购买的任何一件物品，都是用 木头制作的，无论我们走到哪里，都可以看见少数名族的木匠们在忙碌。他们制作的有木制 工具、木制的卡通人物、木制的运动用的产品，等等等等。他们甚至还根据一台真实发动机 仿造了一台长度有20 米的木制发动机。 这个主题公园真是个充满幻想的娱乐公园，怪不得它成为当地旅游业的一个品牌。", "vocabulary": ["according", "advance", "after", "also", "brochure", "brand", "cartoon", "came", "central", "close", "cloth", "could", "culture", "early", "engine", "even", "everyone", "fantasy", "for", "huge", "jungle", "length", "local", "life", "our", "ours", "park", "part", "put", "real", "shop", "sOon", "such", "the", "theme", "they", "travel", "unique", "well", "with", "which", "wonder", "wood"], "vocab_count": 43}, {"id": 21, "title": "A Strange Disease", "body": "When the construction of the firework factory came to the stage of painting, a pump was put in. Then, all the painter sin the neighbourhood were defeated by a severe disease whose characteristic was alike to that of a bad burn. An expert physician was instructed to attend to the victims and handle this case. He was enthusiastic, but he didn’t foresee that it was a hard challenge. After simple enquiry, he announced that the polluted paint was to blame. But without positive evidence, people suspected and rejected his view, saying the theory he put forward made no sense. Being much more strict with himself, he contributed himself to the case. Apart from making enquiries, he made detailed charts and analysed the data cautiously. Finally, he drew a scientific conclusion, linking the disease to the radium in the pump. Exposed to radium, a kind of radioactive material in the universe, people absorbed radiation and got sick immediately. Spinning the pump backward, he took away the radium. This simple movement cured all the victims. 当那座烟花工厂的建设到了油漆阶段时，一个水泵被安装进来，接着，在它附近的油漆 工都得了一种严重的疾病（疾病击败油漆工），其特征与烧伤相似。 一位经验丰富的内科医生被指定去照顾受害者并负责处理这一案例。他热情地投入到工 作中，但是却没有预见到这是一次艰难的挑战。在简单的询问后，他就宣布说罪魁祸首是受 污染的油漆（油漆应受责备）。但是没有确实的证据，人们很怀疑并拒绝他的观点，大家都 说他提出的理论毫无道理。他对自己要求更加严格，全身心地投入。除了询问，他还制作 了详细的图表，谨慎地分析各项数据，最后，他终于得出了一个科学的结论，把疾病和水 泵中的镭联系起来。镭是宇宙中的一种放射性物质，当暴露在镭的辐射中时，人体吸收其射 线，立刻染上疾病。 他把水泵向后旋转，拿走了里面的镭，这个简单的动作治愈了所有的受害者。", "vocabulary": ["after", "alike", "apart", "attend", "away", "backwards", "bad", "blame", "being", "burn", "case", "came", "challenge", "data", "disease", "enthusiastic", "evidence", "expert", "factory", "fireworks", "forward", "from", "handle", "hard", "immediately", "kind", "material", "more", "much", "paint", "physician", "people", "positive", "put", "radiation", "radium", "saying", "sense", "severe", "sick", "simple", "stage", "strict", "that", "the", "then", "theory", "universe", "view", "with", "when", "without", "whose"], "vocab_count": 53}, {"id": 22, "title": "Sightseeing in the United Kingdom", "body": "After the wedding, my cousin and his wife went to the United Kingdom for nationwide sightseeing. He faxed a letter to me in English yesterday. To my delight, he no longer made any tense error. And his description roughly clarified my questions about the UK--its currency, its administration, the institution which divides it into four provinces, and the historical conflicts and quarrels when Southern Ireland broke away from the UK. Unwilling to leave out any attraction, my cousin arranged his enjoyable journey carefully. One attractive place he visited was a castle in the countryside of Scotland, which lies near a port. It used to be the headquarters of the Communism Union but broke down during the war. Finding nothing could take the place of this splendid architecture, people accomplished rebuilding it in1952. It was to their credit that all furnished rooms are consistent with what they used to be. My cousin was thrilled by its collections consisting of statues plus royal uniforms folded in glass tanks. Though there was no possibility to buy some of these exhibits, it was convenient to take photos, which he sent me along with his fax. 我的表弟和他妻子在举办了婚礼后到联合王国做全国旅游观光去了。他昨天传真了一封 英文信给我，让我高兴的是，他再也不犯时态错误了，而且他的描述也粗略地向我阐明了关 于英国的一些问题——它的货币啦，行政管理啦，把它分成四个行政区的制度啦，还有在 南爱尔兰脱离联合王国时发生的一些历史上的冲突和争拗。 因为不愿意漏掉任何一个景点，我表弟仔细地安排了他愉快的旅程。他参观的其中一个吸 引人的地方是苏格兰乡村的一个城堡。城堡靠近一座港口，曾经是共产主义联盟会的总部， 但是在战争中倒塌了。人们发现没有任何东西可以取代这座辉煌的建筑，于是在1952 年完 成了重建。值得赞扬的是，所有配备家具的房间都和它们过去一致的。由雕像加折叠在玻 璃柜里的皇家制服组成的收藏品使我表弟震撼不已。尽管没有可能购买这些展览品，拍照却 很方便，他在传真中一起发给了我。", "vocabulary": ["administration", "after", "along", "any", "away", "castle", "consistent", "convenient", "credit", "could", "countryside", "Cousin", "down", "during", "error", "for", "from", "institution", "into", "kingdom", "leave", "letter", "near", "nothing", "people", "place", "port", "royal", "sightseeing", "some", "splendid", "take", "tense", "that", "the", "their", "there", "these", "they", "though", "union", "united", "used", "war", "wedding", "what", "with", "when", "which", "wife", "yesterday"], "vocab_count": 51}, {"id": 23, "title": "An Air Crash", "body": "I was a previous typist in a post office. Because I couldn’t tolerate typing any more postage bills or postcodes on a typewriter every day, I resigned. With a greedy motivation of making big money, I took up working as a business representative for the G.E Ecology Company, which produced goods by recycling useful materials from our dustbins. My new job left me good impressions in many aspects except that the working timetable was full of traveling by jets. Once, when speeding up, our jet was swallowed by a thunderstorm, which destroyed our GPS receiver and made us lose sight of the directions. A constantly flashing light showed that our jet was in danger. A steward instantly asked us to put on masks and fasten the safety belts, and then pressed a button to switch on the escaping capsule. It slid sideways out of the opening at once and landed in a desert area safely. Lacking food and tablets, we were nervous and uncertain at first. But we all kept optimistic and made good adjustment to the situation. We swept up the surrounding mud to make our settlement and were back on our feet soon. Finally, guided by the smoke of our crashing jet, some local citizens came by carriages and saved us. 我以前是一家邮局的打字员，因为忍受够了每天在打字机上打邮资账单或邮政编码，我辞 了职。带着想挣大钱的贪婪动机，我开始给一家叫G.E 生态公司的企业当商务代表，这家 公司通过回收我们垃圾箱里的有用材料生产商品。我的新工作在多方面都给了我很好的印象， 除了一点：乘飞机旅行挤满了我的工作时间表。 有一次，我们的喷气飞机在加速时被一场雷暴吞没，不仅损坏了GPS 信号接收器，还使 我们看不见方向。一盏持续闪亮的灯说明我们的飞机正处在危险中。一名乘务员立刻让我们 戴上面罩、系牢安全带，接着按下一枚按钮打开逃生仓电源，逃生仓马上侧着滑出出口， 安全降落在一片荒凉的地区。因为缺少食品和药品，我们一开始都又紧张又心里没底，但是 我们都保持乐观，做好调整适应这一新境况。我们打扫干净周围的泥土，安顿下来，很快 就恢复过来。最后，在我们坠机烟雾的指引下，一些当地的居民搭乘马车到来，我们都获救 了。", "vocabulary": ["any", "back", "button", "came", "capsule", "company", "danger", "day", "desert", "ecology", "except", "every", "food", "first", "for", "full", "from", "greedy", "goods", "job", "left", "local", "lose", "light", "make", "more", "mud", "new", "newS", "once", "office", "optimistic", "our", "ours", "post", "put", "sight", "smoke", "situation", "some", "sOon", "steward", "switch", "that", "the", "then", "timetable", "tolerate", "thunderstorm", "with", "when", "which"], "vocab_count": 52}, {"id": 24, "title": "An Amateur Journalist", "body": "Jane is a housewife, but delighted to work as an amateur journalist. It is a dilemma for her to rush between family and work, and it is also unusual for the News Department to depend on an amateur to cover crimes. But Jane is really gifted. It is admirable that she is seldom accused of making mistakes. And, eager to become more professional, she concentrates on her job and updates herself now and then. Once she is informed of a new case, her normal working process is as follows: first, she makes appointments with guilty people for interviews. So as to acquire accurate stories, she usually demands to record what they say. Meanwhile, a technically good colleague will assist her in taking photographs. Second, she assesses whether they are deliberately hiding the truth. If she is skeptical about their words, she will look into the case herself. Third, she writes thorough stories ahead of the deadline and submits it to the senior chief editor, who polishes and approves every section. Finally, her stories will be published in different editions of their magazine. 简是一名家庭主妇，但却非常乐意做一名业余记者。在家和工作之间奔波总是使她左右 为难，而且对于新闻部来说，依靠一名业余人员来报道罪案也是不同寻常的，但是简真的很 有天赋，让人钦佩的是她极少因为犯错而受到责备。因为渴望做得更加专业，她全神贯注 于工作，且时不时地就提升自身的业务水平。 一旦接到新案子的通知，她通常的工作程序如下：首先，她和有罪的人约了作采访。为 了获得准确的新闻，她通常要求做录音，同时，一位技术上好的同事会协助她拍照；接着， 她对受采访的人是否有故意隐瞒真相作出评估。如果她怀疑他们的话，就会亲自调查案件； 然后，她在截稿期限前写出详尽的报道，呈交给高级主编，由他对每个部分做润色和批准； 最后，她的新闻就发表在杂志的各个版本中了。", "vocabulary": ["acquire", "accurate", "amateur", "ahead", "also", "between", "case", "chief", "colleague", "Cover", "deadline", "delighted", "department", "depend", "eager", "editor", "every", "family", "first", "for", "goods", "guilty", "her", "hers", "housewife", "into", "journalist", "job", "magazine", "meanwhile", "more", "new", "newS", "normal", "once", "people", "record", "rush", "say", "second", "section", "seldom", "senior", "that", "the", "their", "then", "they", "third", "thorough", "truth", "unusual", "what", "with", "whether", "who", "work", "will"], "vocab_count": 58}, {"id": 25, "title": "First Aid", "body": "A boy fell ill. His organs were damaged by the radiation of an infrared ray stove. But before the ambulance arrived, a number of other injuries happened to this unlucky boy over and over again. First, he was choked by some poisonous liquid from the kettle on the cupboard. Then his wrist skin was burnt by electric shock. Finally, his ankle was cut by a pan. Fortunately, the boy’s nurse gave him proper temporary treatments according to his complex symptoms. She mildly squeezed the poisonous liquid out of his throat and put bandages firmly in place to apply pressure to the ankle wound to stop bleeding. As for the burn, she used scissors to remove his sleeve, poured a basin of cold water over the burn to cool it and put her hands on a damp blouse to cover his swollen tissue tightly. She also inspired his bravery to fight against the unbearable pain. Her first aid made a vital difference in saving his life. A ceremony was held to honour the nurse who overcame a variety of barriers to save the boy. 有个孩子病倒了，他的体内器官被一台红外线烤炉的放射线灼伤了。但是在救护车到来 前，这个不幸的孩子身上还一而再、再而三地发生了许多别的伤害。开始是被橱柜上水壶里 的有毒液体噎住，然后是手腕的皮肤被电击烧伤，最后，一只平底锅还割伤了他的脚踝。 幸运的是，男孩的保姆根据他的复杂症状给予了适当的临时治疗。她轻轻地从他喉咙里 把有毒液体挤了出来；并在脚踝合适的位置紧紧扎上绷带，施加压力使伤口的流血止住； 对于烧伤，她用剪刀剪去他的袖子，倒了一盆凉水给烧伤位置降温，并找来一件湿的女式 衬衫紧紧盖住他肿胀的皮肤组织。此外，她还激发起他的勇敢和难以忍受的疼痛做斗争。 她的急救在挽救他性命中起了至关重要的作用。人们举办了一场典礼来表彰这位克服各种 障碍挽救了男孩的小保姆。", "vocabulary": ["according", "again", "against", "ambulance", "aid", "ankle", "also", "apply", "basin", "before", "blouse", "burn", "cold", "complex", "cool", "cupboard", "Cover", "cut", "damp", "fight", "first", "for", "from", "her", "hers", "him", "ill", "kettle", "life", "liquid", "nurse", "over", "other", "pain", "pan", "place", "proper", "put", "radiation", "ray", "remove", "save", "shock", "skin", "sleeve", "some", "stop", "temporary", "the", "then", "tissue", "throat", "used", "vital", "water", "who", "wound", "wrist"], "vocab_count": 58}, {"id": 26, "title": "Abstract Art", "body": "Abstract art used to be controversial. On one hand, the artists stopped painting delicate figures but attempted to adopt special techniques to give people different visual impacts. On the other hand, their works, including sculptures carved out of marble or fragile clay, were all with a specific aim of showing feelings. Some conventional scholars who were allergic to abstract art said it was evidently ridiculous and neither art nor geometry. Their Traditional Art Committee predicted its soon disappearing. But nowadays, abstract art has become part of the permanent possessions of contemporary civilization. Galleries along the Madison Avenue give scores of superb exhibitions on typical abstract works, appealing to many who have a preference for abstract art. The Shadow of Egypt, a café in this district, has become the home to those aggressive abstract artists. Consequently, it is not a coincidence for you to meet one of these artists of great reputation in the flesh. They are asked for signatures and given bunches of fragrant flowers plus they are given a great deal of praise by their faithful fans. 抽象艺术曾经颇受争议，一方面，抽象艺术家们不再画精致的画像，而是试图采用特别 的技巧给人们以不同的视觉冲击；另一方面，他们的作品，包括用大理石和易碎的粘土雕 刻出来的雕像，都以表达感情为其明确的目的。有些对抽象艺术反感的传统学者说抽象艺 术是极其明显地荒谬可笑，说它既不是艺术，又不是几何学，他们的传统艺术委员会还预 言了它的迅速消失。 但是到了今天，抽象艺术已经成为当代文明永久财产的一部分，麦蒂逊大道的画廊为典 型的抽象艺术作品举办了许多出色的展览，吸引了许多对抽象艺术有偏爱的人。这区有家叫 埃及之影的咖啡馆已经成为那些有进取精神的抽象艺术家们活动的根据地，所以，亲眼见 到一位名声极大的艺术家本人并不是什么巧合的事，他们被忠实的崇拜者索取签名，并被给 予成束的芬芳花朵和大量的赞扬。", "vocabulary": ["adopt", "aim", "along", "art", "avenue", "clay", "committee", "contemporary", "delicate", "deal", "district", "for", "fragile", "geometry", "give", "great", "hand", "meet", "neither", "nor", "not", "other", "part", "permanent", "people", "praise", "reputation", "shadow", "special", "specific", "some", "sOon", "superb", "the", "their", "these", "they", "those", "typical", "used", "visual", "with", "who"], "vocab_count": 43}, {"id": 27, "title": "A Russian Poem", "body": "Since childhood, Anton had often recited poems, accompanied by pianists and violinists, at wedding ceremonies before brides and bridegrooms exchanged rings. Gradually, he found writing poems the most appropriate way to convey his joy and sorrow. When his poem Contra dictory Blank won him a national championship and a scholarship to the Moscow University from a sponsor, he was just an unknown librarian. After getting his diploma, he devoted his life to writing poems. Using concrete but flexible language and the minimum of words is his style. He tried out different patterns and preferred nursery rhyme in particular. The following is a translation of one of his works made up of 3 sections: Little sparrow with heavy load, Ran out of energy and very cold; No compass and all sweat salty, Can you go through the endless darkness? Little balloon let out by the thread, Flew over cottages and was very glad; With warmth transformed from sunlight, He said he could forever fly; Take it easy, little balloon; Don’t tease the sparrow with his wound; On the bare branch and have a rest; This diamond heart will eventually get success. 从童年时起，安东就常常在钢琴师或小提琴师的伴奏下在婚礼上朗诵诗歌，为新郎新娘 交换戒指前的仪式助兴。渐渐地，他发现写诗是表达他的欢乐和悲伤的最合适方式。在他还 是个寂寞无闻的图书管理员时，他的诗《矛盾的空白》就获得了全国诗歌创作冠军，并为他 赢得一位赞助人提供的奖学金，到莫斯科大学深造。获得文凭后，他将一生都投入到诗歌创 作中。使用具体而灵活的语言和最少的词语数量是他的风格，他还喜欢尝试不同的诗歌形 式，特别是童谣。下面由三部分组成的译文就是他的作品中的一首： 小麻雀，负重担，小气球，脱绳系，别紧张，小气球筋疲力尽挡风寒，飞越农舍真高兴，别 笑麻雀伤口留，汗水成盐无指引，阳光给予它温暖，光光的树梢歇片刻，能否穿越无边暗？ 永远高飞不费力；恒（钻石）心终把成功求。", "vocabulary": ["after", "appropriate", "balloon", "before", "blank", "branch", "childhood", "cold", "concrete", "could", "diploma", "diamond", "easy", "energy", "eventually", "forever", "flexible", "found", "fly", "from", "glad", "gradually", "heavy", "him", "joy", "just", "language", "load", "let", "life", "little", "minimum", "most", "often", "over", "particular", "poem", "rhyme", "rest", "scholarship", "since", "sponsor", "sorrow", "style", "Sweat", "take", "the", "thread", "through", "university", "unknown", "very", "way", "wedding", "with", "when", "will", "wound"], "vocab_count": 58}, {"id": 28, "title": "Let’s Help Adolescents", "body": "Whether they are male or female, adolescents feel like deciding on everything themselves in spite of parents’ instruction, especially when they face problems like sex, mental stress, etc., which make them feel ashamed and embarrassed. Thus they often automatically get into troubles due to their imperfect comprehension and judgement. Some are addicted to cigarettes, only several packets of which will hurt their lungs and make them breathless quickly. Others can’t quit drinking alcohol, whose harmful effects include causing young pregnant women to abort or give birth to abnormal babies. The worst is drug abuse, for the withdrawal is tough once their bodies are accustomed to the drugs. Meanwhile, those who share needles bought from illegal chemists are at great risk of being infected with desperate AIDS. If so, neither injecting nor taking pills can guarantee their survival. However, don’t be disappointed at or have prejudice against our children so easily. After all, being awkward is an appendix of youth. As long as we strengthen communication with them instead of only banning this or banning that, we will surely help them avoid anything unfit. 不论男女，青少年们都喜欢不顾家长的指导，自己对一切作决定，特别是当他们面对如 性、心理压力等等一些使他们觉得羞愧和尴尬的问题时更是如此。因此，由于他们理解力 和判断力的不足，他们常常会无意识地陷入困境中。有的对香烟上瘾，只要几包就会对他们 的肺造成损害，使他们很容易就气喘吁吁；有的没法戒除酒精带来的不良后果，包括造成年 轻的怀孕女性流产或生下不正常的婴儿；最糟糕的是滥用毒品，因为一旦他们的身体对毒品 习惯了，要想戒毒就相当困难了。同时，那些共用从非法药剂师处购买的注射器的青少年 冒着感染令人绝望的艾滋病的极大风险，一旦感染上，不管是打针还是吃药都没法保证他们 的生存了。 然而，请不要轻易就对我们的孩子失望或抱有偏见，毕竟，不成熟是年轻的必然附属品。 只要我们加强和他们的沟通，而不是仅仅禁止这样，不准那样，我们一定能帮助他们避开不 健康的东西。", "vocabulary": ["abnormal", "abuse", "against", "after", "alcohol", "anything", "ashamed", "avoid", "awkward", "birth", "being", "comprehension", "desperate", "drug", "due", "embarrassed", "especially", "everything", "face", "feel", "female", "for", "from", "give", "guarantee", "great", "however", "hurt", "include", "instead", "instruction", "into", "long", "make", "meanwhile", "male", "mental", "neither", "nor", "often", "once", "only", "our", "ours", "prejudice", "quit", "risk", "several", "some", "that", "the", "their", "them", "they", "those", "tough", "with", "when", "whether", "which", "who", "whose", "worst", "will", "young", "youth"], "vocab_count": 66}, {"id": 29, "title": "Refresh Our Environment", "body": "As the director stated on behalf of his researching group, the data of this graph makes a clear presentation of the future environmental tendency. On one hand, the quantity of fuel keeps on decreasing by 9% per year while the growth of a wide range of pollution has been a global trend. On the other hand, the mildly but steadily going up of the average temperature is resulting in catastrophes like widespread floods. Without disagreement, they subscribe to the view that it is humans’ existence and their randomly consuming energy that result in this phenomenon. Many people have a commitment that developing nuclear power or energy from outer space will stop bad consequences coming about. However, scientists and educators are opposed to this view even if our needs may be met on the whole. They tend to advocate refreshing our circumstances by saving energy and recycling waste. It is suggested that we use energy-saving appliances such as electrical motors, microwaves and so on and not be casual about little things like recycling a can. So please glance around and see what you can do. So long as everybody makes contribution, we will not have to put up with this problem anymore. 正如那位主任代表他的研究小组所说明的那样，这张图表的数据清楚地描述了未来环境 的趋势：一方面，燃料的数量以每年9%的速度持续减少，同时，大范围污染的增长已经成 为一种全球趋势；另一反面，平均气温轻微却稳定地升高正在造成像广泛的洪涝那样的灾 难。无不同意地，他们一致赞成是人类的存在和任意的消耗能源才造成了这一现象。 许多人都信奉开发核能和外太空能源会防止糟糕的后果发生的理论，然而，即使这样可 以基本上满足我们的需要，科学家和教育家们仍然反对这一观点。他们更倾向于拥护用节 省能源和回收废料的方法恢复环境生机，并建议我们要使用节省能源的器具，如电力发动机、 微波炉等，还建议我们不要对如回收罐子这种小事漫不经心。因此，看看你身边是否有你能 做的事，只要每个人都作出贡献，我们就不必再忍受这个问题的困扰了。", "vocabulary": ["advocate", "anymore", "around", "average", "bad", "behalf", "clear", "data", "energy", "even", "fuel", "from", "future", "group", "hand", "however", "long", "little", "may", "not", "nuclear", "other", "our", "ours", "phenomenon", "people", "per", "please", "power", "problem", "put", "quantity", "range", "result", "Space", "stop", "subscribe", "such", "temperature", "tend", "that", "the", "their", "they", "trend", "use", "view", "waste", "what", "with", "without", "while", "whole", "wide", "widespread", "will", "year"], "vocab_count": 57}, {"id": 30, "title": "A Volcano Eruption", "body": "As the best candidate, I was appointed to collect and evaluate information for a database about diverse natural disasters, such as hurricanes, typhoons or thunderstorms. Sometimes I did this by giving out questionnaires to those who went through them. But sometimes I had to go through actual disasters myself. The Musaki Volcano was one of them. At that time, I lived in a bungalow alongside the volcano with a novelist, who came for the appreciation of its eruption. One day, when I was drawing diagrams on the balcony and he was bathing inside, the volcano erupted unexpectedly. The ash and lava fountains shooting highly in the sky varied from 50 to100 meters in height. It was absolutely fantastic! I even noticed a rainbow appear in the fog caused by a heat wave. But, glancing through our surroundings, I foresaw the potential danger and found no guarantee of our safety. The uncomfortable gas almost made us unconscious. Sweats of anxiety began to drop. Managing to stop panicking and trembling, we quickly put on our protective suits, helmets and boots and eventually made our way to a safe place. How lucky we were even though my precious equipment and documents were all burnt to the ground! 作为最好的候选人，我被委派为一个数据库收集和评估各种自然灾害的信息，例如飓风、 台风或雷暴等。有时我通过向经历过这些灾害的人分发调查问卷来收集信息，有时却得亲自 经历实际的灾害。Musaki 火山就是其中之一。 那时，我和一名来欣赏火山爆发的小说家同住在火山边上的一座平房里。有一天，当我 正在阳台上画图表而他在屋里洗澡时，火山突然爆发了，喷射到天空中的火山灰和岩浆喷 泉从50 米到100 米不等，这一情景绝对地奇异，我甚至还注意到一条彩虹出现在热浪造成 的雾里。 然而，我向四周看了一下，马上预见到了潜在的危险，也发现了我们的安全毫无保障。令人 不舒服的气体几乎使我们失去知觉，忧虑的汗水开始流淌下来。我们努力使自己不要惊慌 和颤抖，迅速穿上保护套装、头盔和靴子，最后成功前往安全的地方。尽管我珍贵的设备 和文件都烧得精光，但是我们真的非常幸运。", "vocabulary": ["absolutely", "almost", "alongside", "appear", "best", "came", "candidate", "collect", "danger", "database", "day", "diverse", "drop", "equipment", "evaluate", "even", "eventually", "for", "found", "fog", "from", "ground", "guarantee", "heat", "height", "information", "inside", "our", "ours", "place", "potential", "put", "rainbow", "safe", "sky", "stop", "such", "that", "the", "them", "time", "those", "though", "through", "volcano", "wave", "way", "with", "when", "who"], "vocab_count": 50}, {"id": 31, "title": "Defeat Disability", "body": "Yang’s ambition was to get an architect certificate or become a bowling master. But when he was conducting experiments with a microscope in the basement, a tank on the bench exploded, sending him flying outwards through the exit. He was out of breath while knowing he lost his eyesight as well as70% of his hearing. In other words, he was disabled. Feeling clumsy, he was annoyed at first though nobody made fun of him. He cut out going outdoors and just sat around at home talking to his parrot or tortoise silently. His sister resigned to help him in many ways. Her assistance and encouragement were so beneficial to his psychology that he adapted to his disability soon and became outgoing again. In a college accessible to him, he studied politics and literature. He always sat in the front row near the entry without any absence and, with the help of his handy laptop, he studied well by means of dictation. His thesis, Abolishing Slavery, met with all professors’ approval. After class, he and his companions often played drum music, which was noisy but suitable for his hearing. After graduation, he made high profits by designing software for a firm. All in all, in his community, he won his dignity and people’s congratulations. He always wished all the best to his disabled fellows and encouraged them, “Never mind! All you have is adequate to get your achievement.” 阳的雄心是，要么获得一张建筑师证书，要么成为一名保龄球高手。但是在地下室里的 显微镜下进行试验时，放在长凳上的一只大桶突然爆炸，把他从出口处炸飞了出去。当知 道自己除了失去70%的听力之外，还失去了视力时，他完全喘不过气来。换句话说，他残 疾了。 最初，尽管没人取笑他，他还是非常气恼于自己的笨拙。他取消了外出，总是在家里闲 坐，和他的鹦鹉和乌龟默默相对。他的姐姐辞了职，用许多方式帮助他。她的帮助和鼓励 对他的心理是如此地有益，以致他很快就适应了自己的残疾，再次变得外向起来。他在一所 接受他就读的学校里学习政治和文学，总是坐在靠近入口的前排，从不缺席。在他轻便好 用的手提电脑的帮助下，他用听写的方式学习得很好。他的论文《废除奴隶制》受到所有 教授的一致认可。课后，他和伙伴们还常常演奏大声却适合他听觉的鼓乐。毕业后，他通过 设计软件为一家公司获得很高的利润。总之，在他的社区里，他赢得了自己的尊严和人们的 祝贺。 他一直都把所有最好祝愿给予他残疾的同伴，并鼓励他们：“没关系，你拥有的一切一定 足够你取得自己的成就！”", "vocabulary": ["again", "after", "ambition", "any", "architect", "around", "best", "bowling", "breath", "certificate", "college", "community", "cut", "dignity", "dictation", "drum", "entry", "exit", "firm", "first", "for", "fun", "front", "her", "hers", "high", "him", "just", "laptop", "master", "microscope", "mind", "music", "never", "near", "nobody", "often", "outgoing", "other", "people", "psychology", "row", "sister", "software", "sOon", "tank", "that", "the", "them", "though", "through", "well", "with", "when", "without", "which", "while", "yours"], "vocab_count": 58}, {"id": 32, "title": "Happy Marriage Needs Fighting For", "body": "As a talented navy officer, he was bound to be busy. When his wife rang him up to declare her divorce alarm, he was still scanning a digital counter to check the data so as to give an assessment of the theoretical framework for a biochemical weapon. His junior staff’s sympathy made him feel embarrassed. His wife was a part-time clerk. With his high bonus, she lived in a grand house with elegant cushions and bedding. Her favour was reading stars’ biographies or absurd fictions with endless chapters in her armchair. People envied her leisure life very much. But in fact, she was tired of being left alone. She sent emails to his mailbox every week to state her thinking and ask for his accompaniment, but never received reply of satisfaction. Tired of his explanation that he must obey the orders, she filed for divorce. Because he desired to get their holy affection back, he set other affairs aside. He trimmed his fingernails short and changed his overweight figure as well as his awful haircut. He wore an apron to prepare delicious cuisine for her. He also bought her a necklace and piles of flowers hoping that their receiver could turn around. After being tested out for 3 months in all, he eventually succeeded. 作为一名才华出众的海军军官，他注定是要忙碌的。当他的妻子打来电话宣布和他离婚 的警告时，他还在查看一台数码计数器核对数据，以对一种生物化学武器的理论框架做出 评估。他的下级职员表现出的同情使他很尴尬。 他的妻子是一位非全日性工作的职员，有了他的高津贴，她住在一所装饰有优雅垫子和 寝具的富丽堂皇的屋子里。她的爱好是坐在扶手椅上读读明星们的传记或一些有没完没了 章节的荒谬小说。别人都很妒忌她安逸的生活，但是实际上，她厌透了被独自丢下。她每周 都给他的邮箱发电子邮件陈述她的想法，要求他的陪伴，但却从未收到满意答复。受够了他 总是必须服从命令的解释，她提出了离婚。 因为渴望重新获得这份神圣的爱，他把别的事务都放在一边。他剪短了指甲，改变了超 重的身材和糟糕的发型，还穿上围裙为她做可口的菜肴，他甚至还给她买了项链和成堆的 鲜花，希望它们的接受者能够回心转意。 在被考验了总共3 个月后，他最终成功了。", "vocabulary": ["after", "alarm", "alone", "also", "aside", "around", "awful", "back", "being", "bound", "busy", "check", "clerk", "could", "counter", "cuisine", "declare", "data", "digital", "embarrassed", "elegant", "eventually", "every", "fact", "feel", "figure", "favour", "for", "give", "grand", "her", "hers", "high", "him", "house", "junior", "left", "leisure", "life", "much", "must", "never", "navy", "necklace", "obey", "officer", "other", "part", "people", "prepare", "reply", "set", "short", "staff", "state", "still", "sympathy", "that", "the", "their", "time", "tired", "turn", "very", "weapon", "week", "well", "with", "when", "wife"], "vocab_count": 70}, {"id": 33, "title": "Mark and a Seal", "body": "Mark rented an accommodation with his pension near the shore. He paid annual visits there to enjoy the vivid beauty in the depths of the pure sea. Once, with his underwater telescope and flashlight, Mark dived along the boundary between the steep reef and the area of seaweed conservation. Suddenly, an awesome Antarctic seal with sharp teeth appeared opposite him. Every cell in his body was scared to death. But soon, he was aware that he wasn’t the target of an attack. With a neat wound in its lip caused by a shark, this grey seal was washed upside down by the tides time after time. But it tried to jog Mark as if to urge him to help it. So Mark abandoned fleeing away. With its teamwork, Mark used a net to drag the seal to the shallow water. Without pausing he helped it out after a simple operation and settled it in a narrow cave by the seaside. Every time he brought it tasty fish, it would yell and suck his hands happily. Witnesses said their anecdotes reflected a magic dimension of the relationship between humans and animals. 马克用他的退休金在海岸边租了一间住所，每年都去那儿欣赏纯净的大海深处那生动的 美丽。 有一次，马克带着他的水下望远镜和手电筒，潜到陡峭的暗礁和海草保护区间的分界线。 突然，一只长着尖利牙齿、使人畏惧的南极海豹出现在他对面。马克吓坏了，但是很快， 他就意识到，他不是攻击的目标。这只灰色海豹的唇上有道鲨鱼咬出的整齐伤口，还时不时 地被潮水冲得头上脚下。尽管如此，它却总是努力轻轻碰撞马克，似乎在催促他帮助它。于 是马克放弃了逃跑。在这只海豹的合作下，马克用一张网把它拖到浅水区，并毫不停歇给它 动了一个简单的手术，帮助它解决了问题，然后将它安置在海边一个狭窄的洞里。每次当马 克给它带来鲜美可口的鱼时，它就会高兴地大声叫唤，还吮吸他的手。目击者都说他们的轶 事映射出人与动物关系中奇妙的一个方面。", "vocabulary": ["accommodation", "after", "annual", "along", "attack", "aware", "away", "awesome", "beauty", "between", "boundary", "cave", "cell", "conservation", "death", "dimension", "down", "drag", "enjoy", "every", "fish", "flashlight", "grey", "him", "jog", "lip", "magic", "mark", "narrow", "net", "near", "neat", "once", "opposite", "pure", "sea", "shallow", "shark", "sharp", "shore", "simple", "sOon", "target", "that", "the", "their", "telescope", "there", "time", "urge", "used", "vivid", "water", "with", "without", "Would", "wound"], "vocab_count": 57}, {"id": 34, "title": "Helping the Remote Village", "body": "A year ago, the famous astronaut received an invitation by airmail from a remote village. Intending to sniff some fresh air, he and his interpreter paid a fortnight visit there. It was a privilege for them to be there, but they were shocked by what they saw. The tracks were muddy. The river was drying up. Most villagers only possessed one broom, a few tins and several jars and their rectangular grass huts with round angles were surrounded by weeds. Besides, their school had no roof and platform, and the students had no concept of clicking a computer at all. They were badly in need. Soon, the astronaut made a generous voluntary donation to the village. There were textbooks for students, sewing machines for tailors and tractors for farmers. His distribution catalogue also included operating a clinic and a trunk library, as well as giving weekly lessons to teach relevant farming knowledge like how to dry out seeds or raise oxen. He himself not only helped do some paperwork but also purchased grills for boys to toast potatoes and combs for girls who were dying to get one. The other day, he heard from the villagers again inviting him to participate in the donation anniversary. For political and security reasons, he couldn’t adjust his outgoing arrangement-otherwise he would go. But his deeds were remembered forever. 一年前，那位著名的宇航员收到一份由一个偏远村庄通过航空邮件寄来的邀请。因为想 要呼吸一下新鲜空气，他和翻译到那儿做了一次两周的访问。当地之行使他们倍感荣幸，但 却震惊于所见所闻。泥泞的道路、河流干枯，大部分的村民拥有的财产只不过是一只扫帚、 几个瓶瓶罐罐而已，圆角的矩形草屋四周长满了杂草，学校也没有屋顶和讲台，学生们更对 点击操作电脑毫无概念。他们生活确实相当困难。 很快，宇航员就向村庄做了慷慨的自愿捐赠。捐赠品中有给学生的课本，给裁缝的缝纫 机，还有给农民的拖拉机。捐赠金的分配目录中还包括一间诊所和一间书箱图书馆的运作， 并有传授像怎么使种子干透，或者怎么养牛这种相关农业知识的每周课程。他自己不仅亲自 帮助做一些文书工作，还给男孩子们购买了烤马铃薯的烤架、给渴望得到梳子的女孩子们买 了梳子。前几天，他又收到了村民们邀请他参加捐赠周年会的来信。出于政治和安全原因， 他无法调整外出时间安排，否则他就会去了。不过他所做的一切村民们都永远记得。", "vocabulary": ["adjust", "again", "ago", "air", "also", "astronaut", "badly", "clinic", "computer", "concept", "day", "distribution", "dry", "few", "for", "forever", "fresh", "from", "him", "library", "most", "not", "only", "outgoing", "other", "otherwise", "participate", "platform", "raise", "relevant", "remote", "river", "roof", "round", "several", "some", "sOon", "teach", "the", "their", "them", "there", "they", "toast", "trunk", "village", "visit", "well", "what", "with", "who", "Would", "year"], "vocab_count": 53}, {"id": 35, "title": "Study in America", "body": "Nannan’s father runs an enterprise near the Ming Tombs selling batteries and drills to the Daqing Oilfield. Hoping to get the qualification to help govern it, Nannan made much preparation and then left her motherland with her visa to study in America. Having reached her destination, she settled in an inn recommended by the travel agent. As far as Nannan was concerned, she always kept it up in China. But she had to acknowledge it was not easy to adjust herself to the new academic requirements, which were not parallel with China’s. Though she was occupied with lectures and seminars day in and day out, the essays she drafted were still contradicted by her tutors. As for her routine life, she felt that it was hard to fit in, too. For example, she found English idioms difficult to understand. And it was out of the question to eat delicious Chinese foods though many optional cafeterias served abundant substitutes. In addition, she had to wait in a queue early for the minibus that took her to school and it was usually so cold that she felt numb. What bothered her most was that she received no apology when her sleeping was disturbed by a barking dog in a shopkeeper’s cage. Luckily, with her parents comforting her by videophone, she became autonomous soon and eventually got her bachelor’s degree successfully. 楠楠的父亲在明陵附近经营一家企业，销售电池和钻机到大庆油田。抱着获得相应资格 帮助管理的希望，楠楠做了大量准备，然后带着签证离开祖国去美国留学。抵达目的地后， 她在一间旅行代理推荐的旅馆安顿下来。 就楠楠而言，她在国内一直保持着良好的状态，但是在国外，她却不得不承认，要适应 新学院的要求不容易，它们和国内的要求不相同。尽管她整天都忙着听讲座、参加研讨会 努力学习，她起草的论文还是被导师驳了回来。至于日常生活，她也感觉难于适应，例如， 她发觉英语成语很难理解，而且不可能吃到地道的中国食品，尽管可选的许多餐馆都有提供 丰富的替代品。此外，她还得冒着把人冻得麻木的寒冷早起排队等小型巴士去学校。最使 她烦恼的是，一名店主笼子里的狗的吠叫闹得她睡不好觉，但却没有任何人向她道歉。 幸运的是，在她父母通过可视电话的安慰下，她很快就锻炼得自主独立起来，并最终成 功获得了学士学位。", "vocabulary": ["acknowledge", "academic", "adjust", "agent", "cage", "cold", "degree", "day", "destination", "difficult", "dog", "early", "easy", "enterprise", "example", "eventually", "far", "for", "fit", "found", "her", "hard", "hers", "inn", "left", "life", "most", "much", "new", "newS", "near", "not", "question", "queue", "routine", "sOon", "still", "study", "that", "the", "then", "though", "travel", "understand", "visa", "wait", "what", "with", "when", "which"], "vocab_count": 50}, {"id": 36, "title": "Immigrate to America 移民美国", "body": "the Bearing Strait in the Arctic to America. To avoid the Customs’ punishment, they hid in a small ferry called the North Pole Seagull, sitting back to back without sleeping, showering and shaving for 3 days, and had no chance to mourn their lost luggage when landing. The hardship of this crossing was apparent. At first, he made a living by means of raising cattle and then was hired in aircraft industries. He lived in a Catholic district. Taking in a small percentage of Pakistani immigrants, the majority of the residents were from Italy and Denmark, who all kept up their customs and cultures. Different blocks here were distinctly marked out and indicated from the racial angle. It was unfair and needed reforming. But with nowhere else to go, my nephew lived on and managed to make a life for himself. My nephew’s fortune came when he bravely helped a conductor brake a ream to stop it from slipping out of the rails. The man was elected vice chairman of the Socialist Party later. It occurred to my nephew that he could grasp this opportunity to ask for his help. The man who was thankful helped him apply to the civil authority for the right to live in America by inserting his brave deed into his documents. Unlike a great many other applicants, his application was approved by the Federal Justice Ministry. Before long, he started his own bakery and lived a better life. 因为受到美国繁荣的吸引，我的侄子与一名韩国人合作，从北极的白令海峡偷渡到美国。为 了避开海关的惩处，他们躲在一艘叫“北极海鸥”的渡轮里，背靠背坐着，整整3 天没有睡觉、洗 澡和刮胡子，上岸的时候也没有机会心痛他们丢失的行李，这次横渡的艰辛是显而易见的。 起初，他借助饲养牲畜谋生，后来受雇于飞机制造工业。他住的地方是一个天主教区，除了 包括一小部分（百分比）的巴基斯坦移民，大部分的居民都来自于意大利和丹麦，他们都保持 着自己的风俗和文化，使这里的街区都从种族的角度清楚地划出界线，明确标示。这很不公平， 极需改革，但我的侄子没别的地方可去，只好继续居住下去，想法设法开始新的生活。 我侄子的好运在他勇敢地帮助一名列车员刹停一列电车以防止其滑出轨道时到来了。那个人 后来被选为社会党的副主席，我侄子就想到应该抓住机会请求他的帮助。这个人充满感激，立 即把我侄子的勇敢事迹插入到申请文件中，帮助我侄子向美国国内政权当局申请美国居住权。 不像别的许多申请人，我侄子的申请很快被联邦司法部批准了。不久，他就开了自己的面包店， 过上了稍好一点的生活。", "vocabulary": ["angle", "apply", "authority", "avoid", "back", "before", "better", "brake", "brave", "came", "cattle", "chairman", "chance", "civil", "could", "district", "else", "federal", "first", "for", "fortune", "from", "grasp", "great", "him", "into", "justice", "long", "life", "luggage", "live", "make", "nephew", "north", "nowhere", "opportunity", "other", "own", "party", "pole", "right", "small", "socialist", "stop", "strait", "that", "the", "their", "then", "they", "unfair", "unlike", "vice", "with", "when", "without", "who"], "vocab_count": 57}, {"id": 37, "title": "Be Careful about Cloning", "body": "After a series of initial experiments and corrections, the scientist’s hard work paid off when the twin clone turkeys were hatched with normal feather and claws. This breakthrough possibly enabled people to bring their adored pets back to life. However, it bothered him from time to time that their health was in poor condition because they were unable to resist illnesses. This drawback cast him down. Merely 2 weeks later, the clones and their carrier died, which struck frustration into his heart. He retired before he attained his ambition and became a member of an opera chorus to relieve his depression. Shortly afterwards, the media published a conservative argument
